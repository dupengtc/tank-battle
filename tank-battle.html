<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 Battle City</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace}
  #wrap{position:relative;display:inline-block;transform-origin:center}
  #c{background:#000;display:block;image-rendering:pixelated;border:2px solid #333;box-shadow:0 0 40px rgba(0,255,0,0.2)}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.03);pointer-events:none;z-index:2;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)}
  #scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15),rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:3;opacity:0.4}
  #vignette{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:3}
  #crt-effect{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;mix-blend-mode:screen;opacity:0.03}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:6px 12px;background:#000;color:#0f0;font-size:13px;z-index:4;border-bottom:1px solid #333;font-family:'Courier New',monospace}
  .hud-item{display:flex;align-items:center;gap:8px}
  .hud-label{color:#888;font-size:11px;letter-spacing:1px}
  .hud-val{color:#0f0;font-weight:bold;min-width:40px;text-shadow:0 0 6px #0f0}
  .hud-val.red{color:#f44;text-shadow:0 0 10px #f44;font-size:18px}
  .hud-val.gold{color:#fd0;text-shadow:0 0 6px #fd0}
  #msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;display:none;pointer-events:none}
  #msg h1{font-size:36px;color:#0f0;text-shadow:0 0 20px #0f0,0 0 40px #0a0;margin-bottom:16px;letter-spacing:4px;animation:glow 2s ease-in-out infinite}
  #msg h2{font-size:20px;color:#ff0;text-shadow:0 0 10px #ff0;margin-bottom:12px}
  #msg p{color:#aaa;font-size:13px;line-height:1.8}
  #msg .blink{animation:blink 1s infinite}
  #msg .btn-hint{animation:btnPulse 1.5s ease-in-out infinite;cursor:pointer;transition:transform 0.2s}
  #msg .btn-hint:hover{transform:scale(1.1);color:#0f0}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #0f0,0 0 40px #0a0,0 0 60px #0f0}50%{text-shadow:0 0 30px #0f0,0 0 60px #0a0,0 0 80px #0f0}}
  @keyframes btnPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .lives{display:flex;gap:4px}
  .life-icon{width:14px;height:14px;background:#0f0;clip-path:polygon(50% 0%,100% 30%,100% 100%,0 100%,0 30%);box-shadow:0 0 4px #0f0}
  .life-icon.dead{background:#333;box-shadow:none}
  #level-up{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#ff0;font-size:24px;font-weight:bold;text-shadow:0 0 20px #ff0;z-index:6;display:none;animation:fadeUp 1s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
  @keyframes fadeUp{0%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-150%) scale(1)}}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes slideIn{0%{transform:translateX(-100%);opacity:0}100%{transform:translateX(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.95)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  #minimap{position:absolute;bottom:4px;right:4px;width:80px;height:60px;border:1px solid #0f0;z-index:4;opacity:0.8;background:rgba(0,20,0,0.9)}
  .hud-sep{width:1px;height:20px;background:#333;margin:0 4px}
  #powerup-status{min-height:20px}
  .pu-icon{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;overflow:visible}
  .pu-icon .pu-bar{position:absolute;bottom:-4px;left:0;width:100%;height:3px;background:#333;border-radius:1px}
  .pu-icon .pu-bar-fill{height:100%;border-radius:1px;transition:width 0.1s}
  body.high-contrast #c{filter:contrast(1.5)brightness(1.2)}
  body.high-contrast .hud-val{color:#fff;text-shadow:0 0 10px #fff}
  body.high-contrast .enemy{filter:contrast(1.5)}
</style>
</head>
<body>
<div id="wrap">
  <!-- R115: Virtual joystick for mobile -->
  <div id="mobile-controls" style="display:none;position:absolute;bottom:10px;left:0;right:0;z-index:10;pointer-events:none">
    <div id="move-joystick" style="position:absolute;left:20px;bottom:20px;width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:50%;border:2px solid rgba(255,255,255,0.3);pointer-events:auto">
      <div id="joystick-knob" style="position:absolute;left:35px;top:35px;width:30px;height:30px;background:rgba(0,255,0,0.5);border-radius:50%"></div>
    </div>
    <div id="fire-btn" style="position:absolute;right:30px;bottom:40px;width:80px;height:80px;background:rgba(255,100,0,0.6);border-radius:50%;border:3px solid #f64;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:bold;pointer-events:auto">FIRE</div>
  </div>
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">WAVE</span>
      <span class="hud-val gold" id="wave">1</span>
    </div>
    <div class="hud-item" id="time-display">
      <span class="hud-label">TIME</span>
      <span class="hud-val" id="wave-time">30</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ENEMIES</span>
      <span class="hud-val red" id="enemies">0</span>
    </div>
    <div class="hud-item" id="enemy-preview">
      <span class="hud-label">NEXT</span>
      <span id="enemy-types"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="tank-level">1</span>
      <span id="tank-stars" style="color:#ff0;text-shadow:0 0 6px #ff0;font-size:12px;margin-left:-4px">★</span>
    </div>
    <div class="hud-item" id="combo-display" style="display:none">
      <span class="hud-label">COMBO</span>
      <span class="hud-val gold" id="combo-count">0</span>
      <span class="hud-val" id="combo-mult" style="color:#f0f">x1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span id="lives-display" style="color:#f00;font-size:16px;text-shadow:0 0 8px #f00"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-val gold" id="hiscore">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">BASE</span>
      <span id="base-hp" style="color:#f44;font-size:16px;text-shadow:0 0 8px #f44">❤️❤️❤️</span>
    </div>
    <div id="powerup-status" style="display:flex;gap:6px;align-items:center;margin-left:8px"></div>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="msg">
    <h1>坦克大战</h1>
    <h2>BATTLE CITY</h2>
    <p>玩家1: 方向键移动 | 空格射击</p>
    <p>玩家2: WASD移动 | X射击 (双人模式)</p>
    <p>M静音 | P暂停 | C查看统计</p>
    <p>每5波出现BOSS！保护基地！</p>
    <p class="blink" style="margin-top:16px;color:#0f0">[ PRESS ENTER ]</p>
  </div>
  <div id="level-up"></div>
  <canvas id="minimap"></canvas>
</div>
<script>
/* =============================================================
   MODULE: Constants & Configuration
   ============================================================= */
const W=800,H=600,TS=24,G=Math.floor(W/TS),HUD_H=36,GW=TS*G,GH=Math.floor((H-HUD_H)/TS);
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap');
const mmCtx=mm.getContext('2d');
canvas.width=GW;canvas.height=H-HUD_H;
mm.width=80;mm.height=60;

// Object Pools (R71) - reduce GC by reusing objects
const BULLET_POOL_SIZE=100;
const PARTICLE_POOL_SIZE=500;
const EXPLOSION_POOL_SIZE=50;
let bulletPool=[],particlePool=[],explosionPool=[];

// R71+R72: Pool and cache init moved to after class definitions (see below)
function getBullet(){
  for(const b of bulletPool)if(!b.active)return b;
  // Pool exhausted - create new (will be GC'd less often)
  return new Bullet(0,0,0,false);
}
function getParticle(){
  for(const p of particlePool)if(!p.active)return p;
  return new Particle(0,0,'#fff',0);
}
function getExplosion(){
  for(const e of explosionPool)if(!e.active)return e;
  return new Explosion(0,0,false);
}

// R73: Spatial hash grid for collision detection optimization
const SPATIAL_CELL_SIZE=TS*3; // 3x3 tile clusters for broad phase
let spatialGrid={};
function spatialKey(cx,cy){return cx+','+cy;}
function spatialHash(x,y){
  return spatialKey(Math.floor(x/SPATIAL_CELL_SIZE),Math.floor(y/SPATIAL_CELL_SIZE));
}
function spatialInsert(entity,type){
  const key=spatialHash(entity.x,entity.y);
  if(!spatialGrid[key])spatialGrid[key]={bullets:[],enemies:[],players:[],powerups:[]};
  if(type==='bullet')spatialGrid[key].bullets.push(entity);
  else if(type==='enemy')spatialGrid[key].enemies.push(entity);
  else if(type==='player')spatialGrid[key].players.push(entity);
  else if(type==='powerup')spatialGrid[key].powerups.push(entity);
}
function spatialQuery(x,y,radius){
  const results={bullets:[],enemies:[],players:[],powerups:[]};
  const cellX=Math.floor(x/SPATIAL_CELL_SIZE);
  const cellY=Math.floor(y/SPATIAL_CELL_SIZE);
  const cells=Math.ceil(radius/SPATIAL_CELL_SIZE)+1;
  for(let dy=-cells;dy<=cells;dy++){
    for(let dx=-cells;dx<=cells;dx++){
      const key=spatialKey(cellX+dx,cellY+dy);
      const cell=spatialGrid[key];
      if(cell){
        results.bullets.push(...cell.bullets);
        results.enemies.push(...cell.enemies);
        results.players.push(...cell.players);
        results.powerups.push(...cell.powerups);
      }
    }
  }
  return results;
}
function spatialClear(){
  for(const k in spatialGrid)delete spatialGrid[k];
}

// R72: Offscreen canvas for static terrain caching
let terrainCanvas=null,terrainCtx=null;
let terrainCacheValid=false;
function initTerrainCache(){
  if(!terrainCanvas){
    terrainCanvas=document.createElement('canvas');
    terrainCanvas.width=GW;terrainCanvas.height=H-HUD_H;
    terrainCtx=terrainCanvas.getContext('2d');
  }
}
function invalidateTerrainCache(){terrainCacheValid=false;}
function renderTerrainToCache(){
  if(terrainCacheValid)return;
  const tc=terrainCtx,TS2=TS;
  for(let y=0;y<GH;y++){
    for(let x=0;x<G;x++){
      const px=x*TS2,py=y*TS2;
      if(bricks[y]&&bricks[y][x]>0){
        tc.fillStyle=C.brick;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.brickDark;
        tc.fillRect(px+1,py+TS2-3,TS2-2,3);
        tc.fillStyle=C.brickLight;
        tc.fillRect(px+1,py+1,TS2-2,1);
        tc.fillStyle=C.brickDark;
        tc.fillRect(px+TS2/2-1,py,1,TS2);
        tc.fillRect(px,py+TS2/2-1,TS2,1);
      }
      if(steels[y]&&steels[y][x]>0){
        tc.fillStyle=C.steel;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.steelLight;
        tc.fillRect(px+2,py+2,TS2-4,TS2-4);
        tc.fillStyle='#556';
        tc.fillRect(px+TS2/2-1,py,1,TS2);
        tc.fillRect(px,py+TS2/2-1,TS2,1);
      }
      if(forests[y]&&forests[y][x]>0){
        tc.fillStyle=C.grass;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.forest;
        for(let t=0;t<5;t++){
          const tx2=px+4+t*4+Math.sin(t*7)*2;
          const ty2=py+TS2-4-Math.abs(Math.sin(t*3+x))*8;
          tc.fillRect(tx2,ty2,2,8);
          tc.fillStyle=`hsl(120,60%,${25+t*3}%)`;
          tc.beginPath();
          tc.moveTo(tx2+1,ty2);
          tc.lineTo(tx2-2,ty2-4);
          tc.lineTo(tx2+4,ty2-4);
          tc.closePath();
          tc.fill();
          tc.fillStyle=C.forest;
        }
      }
      if(muds[y]&&muds[y][x]>0){
        tc.fillStyle=C.mud;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.mudDark;
        tc.fillRect(px+3,py+3,TS2-6,TS2-6);
        tc.fillRect(px+6,py+6,TS2-12,TS2-12);
      }
      if(ices[y]&&ices[y][x]>0){
        tc.fillStyle=C.ice;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.iceDark;
        tc.fillRect(px+2,py,TS2-4,TS2);
      }
      if(cliffs[y]&&cliffs[y][x]>0){
        tc.fillStyle=C.cliff;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.cliffDark;
        tc.fillRect(px+2,py+2,TS2-4,TS2-4);
        tc.strokeStyle='#000';
        tc.lineWidth=2;
        tc.strokeRect(px+1,py+1,TS2-2,TS2-2);
      }
      if(bridges[y]&&bridges[y][x]>0){
        tc.fillStyle=C.bridge;
        tc.fillRect(px,py,TS2,TS2);
        tc.fillStyle=C.bridgeDark;
        tc.fillRect(px+2,py+2,TS2-4,TS2-4);
      }
    }
  }
  terrainCacheValid=true;
}

// Game state
let gameState='start',score=0,hiScore=0,lives=3,wave=1,enemiesLeft=0,totalEnemies=0,spawnQueue=[];
let player,player2,enemies=[],bullets=[],explosions=[],powerups=[],particles=[],tankDebris=[],damageNumbers=[],tireTrails=[];
let bricks=[],steels=[],waters=[],forests=[],base;
let muds=[],ices=[],cliffs=[],bridges=[]; // New terrain types
let keys={},muted=localStorage.getItem('tankMuted')==='true';
let lastShot=0,lastShotCd=350;
let gameTime=0,spawnTimer=0,spawnInterval=120;
let shieldTimer=0,rapidTimer=0,bigBulletTimer=0,grenadeCount=0,mineCount=0;
// R82: Player skills cooldown system
let skill1Cooldown=0,skill2Cooldown=0; // Q=ShieldDash, E=TimeSlow
const SKILL1_CD=900,SKILL2_CD=1200; // 15s and 20s at 60fps

// R84: Coin and shop system
let coins=0;
let shopItems=[
  {name:'Extra Life',cost:50,action:()=>{lives++;updateLivesDisplay();}},
  {name:'Grenade Pack',cost:30,action:()=>{grenadeCount+=3;}},
  {name:'Mine Pack',cost:30,action:()=>{mineCount+=2;}},
  {name:'Shield Boost',cost:40,action:()=>{shieldTimer=Math.max(shieldTimer,600);}},
  {name:'Rapid Fire',cost:35,action:()=>{rapidTimer=Math.max(rapidTimer,600);}}
];
let shopActive=false;

// R91-R95: Game modes
let gameMode='normal'; // 'normal','endless','challenge','daily','story'
let endlessWave=1;
let challengeType='';
let dailySeed=0;
let secretFound={konami:false,debug:false};

// R96: Balance tuning constants
const BALANCE={
  enemyBaseHp:3, // HP scaling per enemy type
  coinWaveBonus:10, // Base coins per wave
  coinWaveMultiplier:2, // Additional coins per wave
  skill1Damage:500, // Shield dash score per kill
  skill1Radius:TS*2, // Shield dash damage radius
  baseHpPerWave:0.5, // Additional base HP per wave (at high waves)
};

function startEndlessMode(){
  // R91: Endless mode - infinite waves, difficulty scales
  gameMode='endless';
  endlessWave=1;
  startGame(false);
  showToast('ENDLESS MODE ACTIVATED','#f0f');
}
function startChallengeMode(type){
  // R92: Challenge mode with special rules
  gameMode='challenge';
  challengeType=type;
  // Reset with challenge-specific settings
  startGame(false);
  showToast(`CHALLENGE: ${type.toUpperCase()}`,'#ff0');
}
function startDailyChallenge(){
  // R93: Daily challenge with seed-based generation
  gameMode='daily';
  dailySeed=Math.floor(Date.now()/86400000); // Day-based seed
  Math.seedrandom=dailySeed;
  startGame(false);
  showToast('DAILY CHALLENGE - GOOD LUCK!','#0ff');
}
function checkSecret(key){
  // R94: Hidden secrets/easter eggs
  if(!secretFound[key]){
    secretFound[key]=true;
    showToast(`SECRET FOUND: ${key.toUpperCase()}!`,'#f0f',300);
    if(key==='konami'){
      lives=99;coins=999;
      showToast('EXTRA LIVES & COINS!','#0f0',300);
    }
  }
}
function showStory(text){
  // R95: Story mode text display
  const msg=document.getElementById('msg');
  msg.innerHTML=`<p style="color:#fff;font-size:14px;line-height:1.8">${text}</p><p class="blink" style="margin-top:20px">[ PRESS ENTER ]</p>`;
  msg.style.display='block';
}

function showShop(){
  if(gameState!=='playing')return;
  shopActive=true;
  const msg=document.getElementById('msg');
  let itemsHTML=shopItems.map((item,i)=>
    `<div class="shop-item" onclick="buyItem(${i})" style="cursor:pointer;padding:8px;border:1px solid #0f0;margin:4px;background:#000;color:${coins>=item.cost?'#0f0':'#666'}">
      ${item.name} - ${item.cost} coins ${coins>=item.cost?'[BUY]':'[NEED MORE]'}
    </div>`
  ).join('');
  msg.innerHTML=`
    <h2 style="color:#ff0">WAVE ${wave} COMPLETE!</h2>
    <p style="color:#fd0">Coins: ${coins}</p>
    <div style="max-height:200px;overflow-y:auto">${itemsHTML}</div>
    <p class="blink" style="margin-top:12px">[ PRESS ENTER TO CONTINUE ]</p>
  `;
  msg.style.display='block';
  msg.style.color='#fff';
}
function buyItem(idx){
  const item=shopItems[idx];
  if(coins>=item.cost){
    coins-=item.cost;
    item.action();
    playTone(600,'square',0.1,0.2);
    showShop(); // Refresh
  }
}
function closeShop(){
  shopActive=false;
}

function activateSkill1(){
  // R82: Shield Dash - player rushes forward destroying enemies in path
  if(skill1Cooldown>0||!player||!player.alive)return;
  skill1Cooldown=SKILL1_CD;
  screenShake=10;
  flashTimer=10;
  flashColor='rgba(0,150,255,0.4)';
  playExplode();
  // Destroy enemies near player
  const px=player.x,py=player.y;
  enemies.forEach(e=>{
    if(e.alive&&Math.abs(e.x-px)<TS*2&&Math.abs(e.y-py)<TS*2){
      e.alive=false;
      killCount++;
      score+=500;
      createExplosion(e.x+TS/2,e.y+TS/2,true);
      tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
    }
  });
  player.invincible=30;
  player.shieldTimer=30;
}
function activateSkill2(){
  // R82: Time Slow - slows all enemies for 5 seconds
  if(skill2Cooldown>0)return;
  skill2Cooldown=SKILL2_CD;
  slowMotionTimer=300; // 5 seconds
  flashTimer=20;
  flashColor='rgba(100,100,255,0.3)';
  playTone(200,'sine',0.5,0.3);
}
let puBlinkTimer=0;
let comboCount=0,comboTimer=0,comboMultiplier=1;
let screenShake=0,flashTimer=0,flashColor='rgba(255,255,0,0.3)';
let slowMotionTimer=0,hitStopTimer=0;
let frozenTimer=0; // Frozen effect - slows all enemies
let audioCtx=null;
let isTwoPlayer=false;
let mines=[];
let killCount=0,shotsFired=0,shotsHit=0,survivalTime=0;
let restartPromptTimer=0;
let killFlashTimer=0;

// Co-op revival
let playerDead=false; // Player 1 dead and waiting for revival
let player2Dead=false; // Player 2 dead and waiting for revival
let revivalTimer=0; // Timer for auto-revival countdown

// Weather system
let weatherType=0; // 0=none, 1=rain, 2=snow
let weatherParticles=[];
let weatherTimer=0;
const MAX_WEATHER=80;

// Time challenge
let waveTimeLimit=0; // Time limit for current wave (in frames)
let waveTimeRemaining=0;
let waveRageMode=false; // Enemies enraged when time runs out
let rageFlashTimer=0;

// Save system
let unlockedLevels=parseInt(localStorage.getItem('tankUnlockedLevels'))||1;
let savedHiScore=parseInt(localStorage.getItem('tankHiScore'))||0;
let selectedLevel=1;

// Load saved hi-score on startup
if(savedHiScore>hiScore)hiScore=savedHiScore;
loadAchievements();
loadCareerStats();

// R115: Detect touch device and show mobile controls
const isTouchDevice=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
if(isTouchDevice){
  document.getElementById('mobile-controls').style.display='block';
  // Mobile joystick handling
  const moveJoy=document.getElementById('move-joystick');
  const joyKnob=document.getElementById('joystick-knob');
  let joyActive=false,joyId=null;
  moveJoy.addEventListener('touchstart',e=>{e.preventDefault();joyActive=true;joyId=e.touches[0].identifier;updateJoy(e.touches[0]);},{passive:false});
  moveJoy.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.touches)if(t.identifier===joyId){updateJoy(t);break;}},{passive:false});
  moveJoy.addEventListener('touchend',e=>{e.preventDefault();joyActive=false;joyKnob.style.left='35px';joyKnob.style.top='35px';keys['ArrowUp']=false;keys['ArrowDown']=false;keys['ArrowLeft']=false;keys['ArrowRight']=false;},{passive:false});
  function updateJoy(touch){
    const rect=moveJoy.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const dx=touch.clientX-cx,dy=touch.clientY-cy;
    const dist=Math.min(30,Math.sqrt(dx*dx+dy*dy));
    const angle=Math.atan2(dy,dx);
    joyKnob.style.left=(35+Math.cos(angle)*dist)+'px';
    joyKnob.style.top=(35+Math.sin(angle)*dist)+'px';
    const thresh=10;
    keys['ArrowUp']=dy<-thresh;
    keys['ArrowDown']=dy>thresh;
    keys['ArrowLeft']=dx<-thresh;
    keys['ArrowRight']=dx>thresh;
  }
  // Fire button
  const fireBtn=document.getElementById('fire-btn');
  fireBtn.addEventListener('touchstart',e=>{e.preventDefault();if(gameState==='playing'&&player&&player.alive){const b=player.shoot();if(b){bullets.push(b);shotsFired++;}}else if(gameState==='start'||gameState==='gameover'){keys['Enter']=true;}},{passive:false});
}

function initAudio(){

function playTone(freq,type,dur,vol=0.15){
  if(muted||!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function spawnDust(x,y,dir){
  const dustColors=['#a08060','#806040','#605040','#909070'];
  const dirAngles={0:Math.PI/2,1:Math.PI,2:-Math.PI/2,3:0};
  const baseAngle=dirAngles[dir]+Math.PI+(Math.random()-0.5)*0.8;
  const speed=1+Math.random()*2;
  const p=getParticle();
  p.reset(x,y,dustColors[Math.floor(Math.random()*dustColors.length)],speed);
  p.vx=Math.cos(baseAngle)*speed;
  p.vy=Math.sin(baseAngle)*speed;
  p.size=2+Math.random()*2;
  p.life=15+Math.random()*10;
  p.maxLife=p.life;
  p.draw=function(){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life/this.maxLife)*0.6;
    ctx.fillStyle=this.col;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*(0.5+this.life/this.maxLife*0.5),0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  };
  particles.push(p);
}

// Weather system
function updateWeather(){
  weatherTimer++;
  // Change weather every 20-40 seconds
  if(weatherTimer>1200+Math.random()*600){
    weatherTimer=0;
    const prevWeather=weatherType;
    weatherType=Math.floor(Math.random()*3); // 0=none, 1=rain, 2=snow
    weatherParticles=[];
    // Weather change sound
    if(weatherType===1&&!muted){
      playTone(200,'sine',0.1,0.1); // Rain starting
    }else if(weatherType===2&&!muted){
      playTone(400,'sine',0.15,0.08); // Snow starting
    }
  }
  // Spawn weather particles
  if(weatherType>0&&weatherParticles.length<MAX_WEATHER){
    const x=Math.random()*GW;
    const y=-5;
    const speed=weatherType===1?(4+Math.random()*3):(1+Math.random()*1.5);
    weatherParticles.push({
      x:x,y:y,
      vx:weatherType===1?1:0,
      vy:speed,
      life:60+Math.random()*60,
      size:weatherType===1?(1+Math.random()):(2+Math.random()*2)
    });
  }
  // Update particles
  for(let i=weatherParticles.length-1;i>=0;i--){
    const p=weatherParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life--;
    if(p.life<=0||p.y>H){
      weatherParticles.splice(i,1);
    }
  }
}

function drawWeather(){
  if(weatherType===0)return;
  ctx.save();
  for(const p of weatherParticles){
    const alpha=Math.min(1,p.life/30)*0.5;
    ctx.globalAlpha=alpha;
    if(weatherType===1){
      // Rain - visibility reducing effect
      ctx.strokeStyle='#aaf';
      ctx.lineWidth=p.size;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+p.vx*3,p.y+p.vy*3);
      ctx.stroke();
    }else{
      // Snow with footprints in snow terrain
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
  // Weather visibility effects
  if(weatherType===1){
    // Rain - darker overlay, reduced visibility
    ctx.save();
    ctx.globalAlpha=0.15;
    ctx.fillStyle='#001';
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
  if(weatherType===2){
    // Snow - brighter but dim overlay
    ctx.save();
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
    // Draw snow footprints trail
    if(tireTrails.length>0){
      ctx.save();
      ctx.globalAlpha=0.3;
      for(const t of tireTrails){
        if(t.isPlayer||t.isPlayer2){
          ctx.fillStyle='#8cf';
          ctx.fillRect(t.x+4,t.y+4,TS-8,TS-8);
        }
      }
      ctx.restore();
    }
  }
}

class Tank{
  constructor(x,y,dir,isPlayer=false,isPlayer2=false){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;this.isPlayer2=isPlayer2;
    this.w=TS;this.h=TS;this.speed=isPlayer?2.5:(isPlayer2?2.2:1.2+wave*0.1);
    this.shotCd=isPlayer?350:500;this.lastShot=0;this.alive=true;
    this.type=0;this.aiTimer=0;this.aiDir=dir;this.stuck=0;this.lastX=x;this.lastY=y;
    this.level=1;this.shield=false;this.shieldTimer=0;this.invincible=0;this.rapid=false;this.bigBullet=false;
    this.tankColor=isPlayer?C.player:(isPlayer2?'#44d':C.enemy[0]);
    this.shootCount=0;
    this.flashTimer=0;
    this.flashRed=0;
    // R83: Weapon system
    this.weaponType=0; // 0=normal,1=shotgun,2=laser,3=missile
    this.weaponNames=['Normal','Shotgun','Laser','Missile'];
    // R104: Movement physics - more responsive for players
    this.vx=0;this.vy=0;
    this.acceleration=isPlayer?0.6:0.4;
    this.friction=0.88;
    this.maxSpeed=this.speed;
    // Enemy aggro system
    this.aggroTarget=null;
    this.aggroTime=0;
  }
  get cx(){return this.x+TS/2}
  get cy(){return this.y+TS/2}
  switchWeapon(){
    // R83: Cycle to next weapon
    this.weaponType=(this.weaponType+1)%4;
    screenShake=3;
    playTone(800,'square',0.1,0.2);
  }
  canShoot(){
    const now=Date.now();
    const cd=this.rapid?120:(this.isPlayer||this.isPlayer2)?this.shotCd:500;
    return now-this.lastShot>cd;
  }
  shoot(){
    const now=Date.now();
    if(!this.canShoot())return null;
    this.lastShot=now;
    const big=this.bigBullet||this.level>=3;
    // R83: Multi-shot for shotgun
    const shots=this.weaponType===1?3:1;
    for(let s=0;s<shots;s++){
      let bx,by;
      const spread=this.weaponType===1?(s-1)*0.15:0;
      if(this.dir===0){bx=this.cx-2;by=this.y-6}
      else if(this.dir===1){bx=this.x+TS;by=this.cy-2}
      else if(this.dir===2){bx=this.cx-2;by=this.y+TS}
      else{bx=this.x-6;by=this.cy-2}
      playShoot(big);
      // R104: Shooting recoil - slight screen shake
      if(this.isPlayer||this.isPlayer2){
        screenShake=Math.max(screenShake,2);
      }
      spawnMuzzleFlash(bx,by,this.dir);
      const nb=getBullet();
      nb.reset(bx,by,this.dir,this.isPlayer,big,this.isPlayer2);
      // R83: Laser is thin, missile is big
      if(this.weaponType===2)nb.big=false;
      if(this.weaponType===3)nb.big=true;
      bullets.push(nb);
    }
    // R83: Missile has splash damage - handled in bullet collision
    if(this.weaponType===3){
      shotsFired--;
    }
    return null; // Already pushed bullets
  }
  collidesMap(tx,ty){
    const gx=Math.floor(tx/TS),gy=Math.floor((ty-HUD_H)/TS);
    if(gx<0||gx>=G||gy<0||gy>=GH)return true;
    if(bricks[gy]&&bricks[gy][gx]>0)return true;
    if(steels[gy]&&steels[gy][gx]>0)return true;
    if(waters[gy]&&waters[gy][gx]>0&&(!bridges[gy]||bridges[gy][gx]===0))return true;
    if(cliffs[gy]&&cliffs[gy][gx]>0)return true;
    return false;
  }
  canMove(tx,ty){
    const s=TS-2;
    const corners=[
      [tx+1,ty+1],[tx+s,ty+1],[tx+1,ty+s],[tx+s,ty+s]
    ];
    for(const[cx,cy]of corners)if(this.collidesMap(cx,cy))return false;
    if(tx<0||tx+TS>GW||ty<0||ty+TS>H-HUD_H)return false;
    return true;
  }
  move(d){
    if(!this.alive)return;
    this.dir=d;
    // Apply acceleration in the desired direction
    if(d===0)this.vy-=this.acceleration;
    else if(d===1)this.vx+=this.acceleration;
    else if(d===2)this.vy+=this.acceleration;
    else this.vx-=this.acceleration;
  }
  updatePhysics(){
    if(!this.alive)return;
    // Apply terrain effects (mud slows, ice slides)
    const gx=Math.floor(this.x/TS),gy=Math.floor((this.y-HUD_H)/TS);
    let terrainFriction=1.0;
    if(muds[gy]&&muds[gy][gx]>0)terrainFriction=0.7; // Mud slows down
    if(ices[gy]&&ices[gy][gx]>0)terrainFriction=1.05; // Ice is slippery
    // Apply friction with terrain modifier
    this.vx*=this.friction*terrainFriction;
    this.vy*=this.friction*terrainFriction;
    // Clamp velocity
    const speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(speed>this.maxSpeed){
      this.vx=(this.vx/speed)*this.maxSpeed;
      this.vy=(this.vy/speed)*this.maxSpeed;
    }
    // Stop if very slow
    if(Math.abs(this.vx)<0.05)this.vx=0;
    if(Math.abs(this.vy)<0.05)this.vy=0;
    // Try to move with velocity
    let tx=this.x+this.vx,ty=this.y+this.vy;
    if(this.canMove(tx,ty)){
      this.x=tx;this.y=ty;
      this.stuck=0;
      // Dust particles when moving fast enough
      if(speed>1&&Math.random()<0.2)spawnDust(this.cx,this.cy,this.dir);
      // Tire trails - only for players and when moving
      if(speed>0.5&&Math.random()<0.15&&tireTrails.length<200){
        tireTrails.push(new TireTrail(this.x,this.y,this.dir,this.isPlayer||this.isPlayer2));
      }
    }else{
      // Hit wall - try to slide along it
      if(this.canMove(this.x+this.vx,this.y)){
        this.x+=this.vx;this.stuck=0;
      }else if(this.canMove(this.x,this.y+this.vy)){
        this.y+=this.vy;this.stuck=0;
      }else{
        this.stuck++;
        this.vx=0;this.vy=0;
      }
    }
    this.lastX=this.x;this.lastY=this.y;
  }
  ai(){
    if(this.isPlayer||this.isPlayer2)return;
    this.aiTimer++;
    if(this.aggroTime>0)this.aggroTime--;
    const targets=player&&player.alive?[player]:[];
    if(isTwoPlayer&&player2&&player2.alive)targets.push(player2);
    if(targets.length===0&&(!base||!base.alive))return;

    // Find closest target - prioritize aggro target if valid
    let px,py,td;
    // Heavy tanks (type 2) sometimes target the base instead
    const baseTarget=base&&base.alive&&(this.type===2||this.type===3)&&Math.random()<0.2;
    if(baseTarget){
      px=base.x;py=base.y;td=Math.abs(px-this.x)+Math.abs(py-this.y);
    }else if(this.aggroTime>0){
      const aggro=this.aggroTarget==='player1'&&player&&player.alive?player:isTwoPlayer&&this.aggroTarget==='player2'&&player2&&player2.alive?player2:null;
      if(aggro){
        px=aggro.x;py=aggro.y;td=Math.abs(px-this.x)+Math.abs(py-this.y);
      }
    }
    if(td===undefined){
      if(targets.length>0){
        px=targets[0].x;py=targets[0].y;td=Math.abs(px-this.x)+Math.abs(py-this.y);
        for(const t of targets){
          const d=Math.abs(t.x-this.x)+Math.abs(t.y-this.y);
          if(d<td){px=t.x;py=t.y;td=d;}
        }
      }else if(base&&base.alive){
        px=base.x;py=base.y;td=Math.abs(px-this.x)+Math.abs(py-this.y);
      }
    }

    const dx=px-this.x,dy=py-this.y;

    // Type-based behavior patterns
    const typePatterns={
      0:()=>{this.speed=Math.min(1.2+wave*0.1,2.5);this.shootInterval=25;}, // Fast scout - rapid fire
      1:()=>{this.speed=Math.min(1.6+wave*0.08,3.0);this.shootInterval=20;}, // Medium - balanced
      2:()=>{this.speed=Math.min(0.8+wave*0.05,1.8);this.shootInterval=12;}, // Slow heavy - rapid accurate fire
      3:()=>{this.speed=Math.min(1.2+wave*0.1,2.2);this.shootInterval=18;}  // Standard - adaptive
    };
    if(typePatterns[this.type])typePatterns[this.type]();

    // Smart obstacle avoidance - check ahead before moving
    const aheadDir=(dir)=>{
      const lookDist=TS*2;
      let lx=this.cx,ly=this.cy;
      if(dir===0)ly-=lookDist;
      else if(dir===1)lx+=lookDist;
      else if(dir===2)ly+=lookDist;
      else lx-=lookDist;
      const gx=Math.floor(lx/TS),gy=Math.floor((ly-HUD_H)/TS);
      if(gx<0||gx>=G||gy<0||gy>=GH)return false;
      return (bricks[gy]&&bricks[gy][gx]>0)||(steels[gy]&&steels[gy][gx]>0);
    };

    if(this.stuck>15){
      this.aiDir=(this.aiDir+2)%4;
      this.stuck=0;
    }
    // Smart direction selection with obstacle avoidance
    if(this.aiTimer%6===0){
      const absDx=Math.abs(dx),absDy=Math.abs(dy);
      let preferredDir;
      if(absDx>absDy){
        preferredDir=dx>0?1:3;
      }else{
        preferredDir=dy>0?2:0;
      }
      // If preferred direction is blocked, try alternatives
      if(aheadDir(preferredDir)){
        const alternatives=[(preferredDir+1)%4,(preferredDir+3)%4,(preferredDir+2)%4];
        for(const alt of alternatives){
          if(!aheadDir(alt)){this.aiDir=alt;break;}
        }
      }else{
        this.aiDir=preferredDir;
      }
      // Type 2 (slow heavy) is more cautious - checks both axes
      if(this.type===2&&aheadDir(this.aiDir)){
        const otherAx=absDx>absDy?(dy>0?2:0):(dx>0?1:3);
        if(!aheadDir(otherAx))this.aiDir=otherAx;
      }
      // Add randomness to avoid predictable patterns (varies by type)
      const randChance=this.type===0?0.25:this.type===2?0.1:0.2;
      if(Math.random()<randChance){
        this.aiDir=(this.aiDir+[1,3][Math.floor(Math.random()*2)])%4;
      }
    }
    // Shoot when has line of sight - type 2 (heavy) shoots more frequently
    // Rage mode: shoot 30% faster
    let shootInterval=this.type===2?12:20;
    if(waveRageMode)shootInterval=Math.floor(shootInterval*0.7);
    if(this.aiTimer%shootInterval===0&&this.canShoot()&&this.hasLineOfSight(px,py)){
      const b=this.shoot();
      if(b)bullets.push(b);
    }
    this.move(this.aiDir);
  }
  hasLineOfSight(targetX,targetY){
    targetX=targetX||(player?player.cx:0);
    targetY=targetY||(player?player.cy:0);
    const cx=this.cx,cy=this.cy;
    const steps=Math.max(Math.abs(targetX-cx),Math.abs(targetY-cy))/TS;
    if(steps<1)return true;
    const sx=(targetX-cx)/steps,sy=(targetY-cy)/steps;
    for(let i=0;i<=steps;i++){
      const tx=cx+sx*i,ty=cy+sy*i;
      const gx=Math.floor(tx/TS),gy=Math.floor((ty-HUD_H)/TS);
      if(gx>=0&&gx<G&&gy>=0&&gy<GH){
        if(bricks[gy]&&bricks[gy][gx]>0)return false;
        if(steels[gy]&&steels[gy][gx]>0)return false;
      }
    }
    return true;
  }
  draw(){
    if(!this.alive)return;
    const x=Math.floor(this.x),y=Math.floor(this.y);
    ctx.save();
    // R102: Spawn flicker effect - enemy flickers when spawning
    if(this.spawnTimer>0&&!this.isPlayer&&!this.isPlayer2){
      if(Math.floor(this.spawnTimer/3)%2===0){
        ctx.globalAlpha=0.3;
      }
    }
    // Invincibility flash - 5秒无敌时半透明闪烁
    if(this.invincible>0){
      const flashPhase=Math.floor(this.invincible/8)%2;
      if(flashPhase===0){
        ctx.globalAlpha=0.4+0.3*Math.sin(this.invincible/5);
      }else{
        ctx.globalAlpha=0.7;
      }
      // 无敌光环效果
      ctx.save();
      ctx.globalAlpha=0.3+0.2*Math.sin(this.invincible/8);
      ctx.strokeStyle='#0cf';
      ctx.lineWidth=2;
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.cx,this.cy,TS*0.9,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    // Flash effect when hit - 红色闪烁
    if(this.flashRed>0){
      ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(this.flashRed/2));
    }
    // Flash effect when hit (damage flash)
    if(this.flashTimer>0){
      ctx.globalAlpha=0.7;
    }
    ctx.translate(x+TS/2,y+TS/2);
    // R105: Size scale for enemy type variation
    const sizeMult=this.sizeScale||1;
    ctx.scale(sizeMult,sizeMult);
    ctx.rotate(this.dir*Math.PI/2);
    ctx.translate(-TS/2,-TS/2);

    // Dynamic tank shadow based on direction
    ctx.fillStyle='rgba(0,0,0,0.35)';
    const shadowOffsets={0:{x:3,y:5},1:{x:-2,y:3},2:{x:-3,y:-2},3:{x:3,y:-2}};
    const so=shadowOffsets[this.dir]||{x:3,y:3};
    ctx.fillRect(so.x,so.y,TS-2,TS-2);

    // Tank glow effect for players - R133: Enhanced dynamic glow + R123: Dynamic glow with pulsing aura
    const time=Date.now();
    const pulse=Math.sin(time/200)*4;
    // R123: Add color-shifting glow based on HP state
    let glowColor=this.tankColor;
    let glowIntensity=5;
    if(this.isPlayer||this.isPlayer2){
      glowColor=this.isPlayer?'#4a4':'#44d';
      glowIntensity=12+pulse;
      // R123: Low HP warning glow - shift to red/orange
      if(this.hp&&this.maxHp&&this.hp<this.maxHp*0.3){
        glowColor='#f40';
        glowIntensity=18+Math.sin(time/100)*6;
        // R123: Outer warning ring
        ctx.save();
        ctx.globalAlpha=0.3+0.2*Math.sin(time/80);
        ctx.strokeStyle='#f40';
        ctx.lineWidth=2;
        ctx.shadowColor='#f40';
        ctx.shadowBlur=20;
        ctx.beginPath();
        ctx.arc(this.cx,this.cy,TS*1.3,0,Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }else if(this.isBoss){
      glowColor='#f0f';
      glowIntensity=20+Math.sin(time/150)*10;
    }
    ctx.shadowColor=glowColor;
    ctx.shadowBlur=glowIntensity;
    // R123: Extra outer aura for players (layered glow)
    if((this.isPlayer||this.isPlayer2)&&this.alive){
      ctx.save();
      ctx.globalAlpha=0.15+0.05*Math.sin(time/300);
      ctx.shadowBlur=25;
      ctx.fillStyle='transparent';
      ctx.beginPath();
      ctx.arc(this.cx,this.cy,TS*0.8,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    let col=this.tankColor;
    // 被击中红色闪烁效果
    if(this.flashRed>0){
      col='#f44';
    }
    const dark=this.isPlayer||this.isPlayer2?(this.isPlayer?C.playerDark:'#339'):this.tankColor;

    // Tank body with level-based detail
    ctx.fillStyle=col;
    if(this.level>=2){
      ctx.fillRect(3,3,18,18);
      ctx.fillStyle=dark;
      ctx.fillRect(5,5,14,14);
      ctx.fillStyle=col;
      ctx.fillRect(7,7,10,10);
    }else{
      ctx.fillRect(4,4,16,16);
      ctx.fillStyle=dark;
      ctx.fillRect(6,6,12,12);
      ctx.fillStyle=col;
      ctx.fillRect(8,8,8,8);
    }

    // Tank barrel
    ctx.fillStyle='#555';
    ctx.fillRect(TS/2-2,TS/2-2,4,TS/2+2);

    // Barrel color based on player type
    if(this.isPlayer){
      ctx.fillStyle=this.level>=3?'#ff0':'#8f8';
    }else if(this.isPlayer2){
      ctx.fillStyle=this.level>=3?'#ff0':'#8af';
    }else{
      ctx.fillStyle='#fa0';
    }
    ctx.fillRect(TS/2-1,TS/2,2,TS/2-2);

    // Corner bolts for leveled tanks
    if(this.level>=2){
      ctx.fillStyle='#666';
      ctx.fillRect(2,2,4,4);
      ctx.fillRect(18,2,4,4);
      ctx.fillRect(2,18,4,4);
      ctx.fillRect(18,18,4,4);
    }
    ctx.restore();

    // Shield effect - use global shieldTimer synced to instance
    const showShield=this.shield||(this.shieldTimer>0);
    if(showShield){
      ctx.save();
      ctx.globalAlpha=0.4+0.3*Math.sin(Date.now()/100);
      ctx.strokeStyle='#0cf';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(this.cx,this.cy,TS*0.8,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // Invincibility countdown display (for player respawn protection)
    if(this.invincible>0 && (this.isPlayer||this.isPlayer2)){
      const sec=Math.ceil(this.invincible/60);
      ctx.save();
      ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(Date.now()/200));
      ctx.fillStyle='#0cf';
      ctx.font='bold 10px Courier New';
      ctx.textAlign='center';
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=6;
      ctx.fillText('★'+sec+'★',this.cx,this.y-6);
      ctx.restore();
    }

    // Update flash timer
    if(this.flashTimer>0)this.flashTimer--;
    if(this.flashRed>0)this.flashRed--;
  }
  drawMinimap(){
    if(!this.alive)return;
    mmCtx.fillStyle=this.isPlayer?'#0f0':(this.isPlayer2?'#44f':'#f44');
    mmCtx.fillRect(this.x/GW*80,this.y/(H-HUD_H)*60,3,3);
  }
}

class Bullet{
  constructor(x,y,dir,isPlayer,big=false,isPlayer2=false){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;this.isPlayer2=isPlayer2;this.big=big;
    this.active=false; // R71: pool tracking
    this.reset(x,y,dir,isPlayer,big,isPlayer2);
  }
  reset(x,y,dir,isPlayer,big=false,isPlayer2=false){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;this.isPlayer2=isPlayer2;this.big=big;
    this.speed=big?8:6;this.alive=true;this.active=true;this.w=big?6:4;this.h=big?6:4;
    this.hitboxScale=0.9;
    this.trail=[];
  }
  getHitbox(){
    const s=TS*this.hitboxScale;
    return{
      x:this.x-s/2,
      y:this.y-s/2,
      w:s,
      h:s
    };
  }
  update(){
    // Store trail position
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>6)this.trail.shift();

    if(this.dir===0)this.y-=this.speed;
    else if(this.dir===1)this.x+=this.speed;
    else if(this.dir===2)this.y+=this.speed;
    else this.x-=this.speed;
    if(this.x<0||this.x>GW||this.y<0||this.y>H-HUD_H){this.alive=false;this.active=false;}
  }
  draw(){
    // Draw trail
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const alpha=(i+1)/this.trail.length*0.5;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=this.big?C.bulletBig:C.bullet;
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.big?3:1.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // Draw bullet
    ctx.save();
    ctx.fillStyle=this.big?C.bulletBig:C.bullet;
    ctx.shadowColor=this.big?'#f80':'#ff0';
    ctx.shadowBlur=this.big?10:6;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.big?4:2.5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(this.x-1,this.y-1,this.big?1.5:1,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

class Explosion{
  constructor(x,y,big=false){
    this.active=false; // R71: pool tracking
    this.reset(x,y,big);
  }
  reset(x,y,big=false){
    this.x=x;this.y=y;this.big=big;
    this.frame=0;this.maxFrame=big?25:15;
    this.alive=true;this.active=true;
    this.particles=[];
    // Pre-generate explosion particles - orange-red focus
    const expColors=['#f80','#f60','#f40','#f00','#fa0','#fc0','#ff0'];
    const count=big?30:12+Math.floor(Math.random()*4); // 12-15 for normal
    for(let i=0;i<count;i++){
      this.particles.push({
        angle:Math.random()*Math.PI*2,
        speed:Math.random()*(big?8:5)+2,
        size:Math.random()*(big?6:3)+2,
        color:expColors[Math.floor(Math.random()*expColors.length)],
        life:1
      });
    }
  }
  update(){
    this.frame++;
    if(this.frame>=this.maxFrame){this.alive=false;this.active=false;}
    // Update particle life
    for(const p of this.particles){
      p.life-=0.05;
    }
  }
  draw(){
    const p=this.frame/this.maxFrame;
    ctx.save();
    const cx=Math.floor(this.x),cy=Math.floor(this.y);

    // Core explosion
    const r=this.big?TS*p*1.8:TS*p*1.2;
    const ci=Math.min(4,Math.floor(p*5));
    ctx.globalAlpha=1-p;
    ctx.fillStyle=C.exp[ci];
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();

    // Outer ring for big explosions
    if(this.big){
      ctx.globalAlpha=(1-p)*0.5;
      ctx.fillStyle=C.exp[Math.min(4,ci+1)];
      ctx.beginPath();
      ctx.arc(cx+Math.cos(Date.now()/50)*3,cy+Math.sin(Date.now()/50)*3,r*0.7,0,Math.PI*2);
      ctx.fill();
      // R109: Shockwave ring effect
      ctx.globalAlpha=(1-p)*0.3;
      ctx.strokeStyle='#fff';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(cx,cy,r*1.5*(1+p),0,Math.PI*2);
      ctx.stroke();
    }

    // Particles
    ctx.globalAlpha=1;
    for(const part of this.particles){
      if(part.life<=0)continue;
      const px=cx+Math.cos(part.angle)*part.speed*(1-p)*10;
      const py=cy+Math.sin(part.angle)*part.speed*(1-p)*10;
      ctx.globalAlpha=part.life;
      ctx.fillStyle=part.color;
      ctx.fillRect(px,py,part.size*(1-p*0.5),part.size*(1-p*0.5));
    }
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,col,speed=6,glow=false,trailLen=0){
    this.active=false; // R71: pool tracking
    this.reset(x,y,col,speed,glow,trailLen);
  }
  reset(x,y,col,speed=6,glow=false,trailLen=0){
    this.x=x;this.y=y;this.col=col;
    this.vx=(Math.random()-0.5)*speed;
    this.vy=(Math.random()-0.5)*speed;
    this.life=25+Math.random()*25;
    this.maxLife=this.life;
    this.alive=true;this.active=true;
    this.size=Math.random()*3+1;
    this.glow=glow;
    this.trail=[];
    this.trailLength=trailLen;
    // R142: Rotation and dynamic physics
    this.rot=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.3;
    this.bounce=Math.random()<0.25;
    this.friction=0.92+Math.random()*0.06;
  }
  update(){
    if(this.trailLength>0){
      this.trail.unshift({x:this.x,y:this.y,life:this.life});
      if(this.trail.length>this.trailLength)this.trail.pop();
    }
    this.x+=this.vx;this.y+=this.vy;
    if(this.bounce){
      if(this.x<0||this.x>GW){this.vx*=-0.5;this.x=Math.max(0,Math.min(GW,this.x));}
      if(this.y<HUD_H||this.y>H){this.vy*=-0.5;this.y=Math.max(HUD_H,Math.min(H,this.y));}
    }
    this.vx*=this.friction;this.vy*=this.friction;
    this.rot+=this.rotSpeed;
    this.life-=0.8;
    if(this.life<=0){this.alive=false;this.active=false;}
  }
  draw(){
    ctx.save();
    const lifeRatio=Math.max(0,this.life/this.maxLife);
    // R142: Draw trail with gradient circular fade
    if(this.trail.length>0){
      for(let i=0;i<this.trail.length;i++){
        const t=this.trail[i];
        const trailLife=t.life/this.maxLife;
        const alpha=lifeRatio*trailLife*0.6*(1-i/this.trail.length);
        if(alpha<=0)continue;
        ctx.globalAlpha=alpha;
        ctx.fillStyle=this.col;
        const ts=this.size*trailLife*(0.5+i/this.trail.length*0.5);
        ctx.beginPath();
        ctx.arc(t.x+this.size/2,t.y+this.size/2,ts*0.8,0,Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha=lifeRatio;
    ctx.fillStyle=this.col;
    if(this.glow){
      ctx.shadowColor=this.col;
      ctx.shadowBlur=15*lifeRatio;
    }
    const s=Math.floor(this.size*lifeRatio+1);
    // R142: Rotated square with bright core
    ctx.translate(Math.floor(this.x)+s/2,Math.floor(this.y)+s/2);
    ctx.rotate(this.rot);
    ctx.fillRect(-s/2,-s/2,s,s);
    if(this.size>2.5){
      ctx.globalAlpha=lifeRatio*0.7;
      ctx.fillStyle='#fff';
      ctx.fillRect(-s/3,-s/3,s*0.66,s*0.66);
    }
    ctx.restore();
  }
}

// Floating damage number class
class DamageNumber{

// Tank tire trail class
class TireTrail{
  constructor(x,y,dir,isPlayer){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;
    this.life=60+Math.random()*30;
    this.maxLife=this.life;
    this.alive=true;
    // Two tracks for each tank tread
    const offset=TS/4;
    if(dir===0){this.x1=x+offset;this.y1=y+TS-2;this.x2=x+TS-offset;this.y2=y+TS-2;}
    else if(dir===1){this.x1=x+2;this.y1=y+offset;this.x2=x+2;this.y2=y+TS-offset;}
    else if(dir===2){this.x1=x+offset;this.y1=y+2;this.x2=x+TS-offset;this.y2=y+2;}
    else{this.x1=x+TS-2;this.y1=y+offset;this.x2=x+TS-2;this.y2=y+TS-offset;}
  }
  update(){
    this.life--;
    if(this.life<=0)this.alive=false;
  }
  draw(){
    const alpha=(this.life/this.maxLife)*0.3;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.isPlayer?'#3a3':'#533';
    ctx.fillRect(this.x1-1,this.y1-1,3,3);
    ctx.fillRect(this.x2-1,this.y2-1,3,3);
    ctx.restore();
  }
}

// Mine class - player placed explosive
class Mine{
  constructor(x,y){
    this.x=x;this.y=y;
    this.w=TS;this.h=TS;
    this.alive=true;
    this.timer=0;
    this.maxTimer=180; // 3 seconds to arm
    this.armed=false;
  }
  update(){
    this.timer++;
    if(this.timer>=this.maxTimer)this.armed=true;
  }
  draw(){
    ctx.save();
    const pulse=0.7+0.3*Math.sin(Date.now()/100);
    ctx.translate(this.x+TS/2,this.y+TS/2);
    ctx.scale(pulse,pulse);
    // Mine body
    ctx.fillStyle=this.armed?'#f00':'#660';
    ctx.shadowColor=this.armed?'#f00':'#660';
    ctx.shadowBlur=this.armed?10:5;
    ctx.beginPath();
    ctx.arc(0,0,TS/3,0,Math.PI*2);
    ctx.fill();
    // Spikes
    ctx.fillStyle=this.armed?'#f44':'#880';
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI*2;
      ctx.fillRect(-2,-TS/2,4,TS/4);
      ctx.save();
      ctx.rotate(angle);
      ctx.fillRect(-2,-TS/2,4,TS/4);
      ctx.restore();
    }
    ctx.restore();
  }
  checkHit(tank){
    if(!this.armed||!tank.alive)return false;
    return Math.abs(this.x+TS/2-tank.cx)<TS&&Math.abs(this.y+TS/2-tank.cy)<TS;
  }
}

// 坦克裂解碎片类
// R76: Tank smoke particles rising from destroyed tanks
class TankSmoke{
  constructor(x,y){
    this.x=x;this.y=y;
    this.particles=[];
    this.alive=true;
    this.maxLife=60;
    this.life=this.maxLife;
  }
  update(){
    this.life--;
    if(this.life<=0){this.alive=false;return;}
    // Add new smoke particles
    if(this.life%5===0&&this.particles.length<8){
      this.particles.push({
        x:this.x+(Math.random()-0.5)*TS*0.5,
        y:this.y,
        vx:(Math.random()-0.5)*0.5,
        vy:-0.5-Math.random()*0.5,
        size:4+Math.random()*4,
        life:30+Math.random()*20
      });
    }
    // Update particles
    this.particles=this.particles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;
      p.size+=0.1;
      p.life--;
      return p.life>0;
    });
  }
  draw(){
    ctx.save();
    for(const p of this.particles){
      const alpha=(p.life/50)*0.4;
      ctx.globalAlpha=alpha;
      ctx.fillStyle='#333';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

class TankDebris{
  constructor(x,y,dir,tankColor){
    this.x=x;this.y=y;this.dir=dir;this.tankColor=tankColor;
    this.frame=0;this.maxFrame=15; // 0.25秒 @ 60fps
    this.alive=true;
    this.w=TS/2;this.h=TS/2;
    // R76: Add smoke emitter
    this.smoke=new TankSmoke(x,y);
    // 4个碎片向外扩散
    const angles=[Math.PI*0.25,Math.PI*0.75,Math.PI*1.25,Math.PI*1.75];
    this.pieces=angles.map((angle,i)=>({
      offsetX:(i%2===0?-1:1)*TS/4,
      offsetY:(i<2?-1:1)*TS/4,
      angle:angle,
      speed:4+Math.random()*2,
      rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.3
    }));
  }
  update(){
    this.frame++;
    if(this.frame>=this.maxFrame)this.alive=false;
    // R76: Update smoke
    this.smoke.update();
    if(!this.smoke.alive)this.smoke=null;
    // 更新碎片位置
    const progress=this.frame/this.maxFrame;
    for(const p of this.pieces){
      p.offsetX+=Math.cos(p.angle)*p.speed*(1-progress);
      p.offsetY+=Math.sin(p.angle)*p.speed*(1-progress);
      p.rotation+=p.rotSpeed;
    }
  }
  draw(){
    const progress=this.frame/this.maxFrame;
    ctx.save();
    ctx.globalAlpha=1-progress*0.5;
    for(const p of this.pieces){
      const px=this.x+p.offsetX;
      const py=this.y+p.offsetY;
      ctx.save();
      ctx.translate(px,py);
      ctx.rotate(p.rotation);
      ctx.fillStyle=this.tankColor;
      ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
      // 碎片边缘
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(-this.w/2+2,-this.h/2+2,this.w-4,2);
      ctx.restore();
    }
    ctx.restore();
    // R76: Draw smoke
    if(this.smoke)this.smoke.draw();
  }
}

/* =============================================================
   MODULE: Map Generation & Rendering
   ============================================================= */
function generateMap(wv){
  bricks=[];steels=[];waters=[];forests=[];
  for(let y=0;y<GH;y++){
    bricks[y]=[];steels[y]=[];waters[y]=[];forests[y]=[];
    for(let x=0;x<G;x++){
      bricks[y][x]=0;steels[y][x]=0;waters[y][x]=0;forests[y][x]=0;muds[y][x]=0;ices[y][x]=0;cliffs[y][x]=0;bridges[y][x]=0;
    }
  }
  const bG=G*TS/TS,bH=GH;
  // Bottom wall
  for(let x=1;x<bG-1;x++){
    bricks[bH-1][x]=1;
    if(wv>=2&&x>2&&x<bG-3&&(x%3===0))bricks[bH-2][x]=1;
  }
  bricks[bH-1][0]=0;bricks[bH-1][bG-1]=0;
  // Top wall
  for(let x=0;x<bG;x++){
    bricks[0][x]=1;bricks[1][x]=1;
    bricks[0][x]=0;
  }
  // Side walls
  for(let y=0;y<bH;y++){
    bricks[y][0]=1;bricks[y][bG-1]=1;
  }

  // Clear base area
  const baseX=Math.floor(bG/2)-1;
  const baseY=bH-2;
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      bricks[baseY+dy][baseX+dx]=0;
    }
  }

  // Random brick/steel clusters
  for(let i=0;i<4;i++){
    const ex=Math.floor(Math.random()*(bG-4))+2;
    const ey=Math.floor(Math.random()*(bH-8))+3;
    for(let dy=-1;dy<=1;dy++){
      for(let dx=-1;dx<=1;dx++){
        if(ey+dy>=0&&ey+dy<bH&&ex+dx>=0&&ex+dx<bG){
          if(Math.random()<0.5){
            bricks[ey+dy][ex+dx]=1;
          }else{
            steels[ey+dy][ex+dx]=1;
          }
        }
      }
    }
  }

  // Predefined patterns based on wave
  const patterns=[
    [[2,4],[2,5],[2,6],[3,4],[3,6],[4,4],[4,5],[4,6]], // Left fort
    [[10,4],[10,5],[10,6],[11,4],[11,6],[12,4],[12,5],[12,6]], // Right fort
    [[6,10],[6,11],[7,10],[8,10]], // Center top
    [[15,10],[15,11],[16,10],[17,10]], // Far right
    [[2,16],[2,17],[3,16],[3,17],[2,18],[3,18]], // Left bottom fort
    [[16,16],[16,17],[17,16],[17,17],[16,18],[17,18]], // Right bottom fort
    [[5,6],[5,7],[6,6],[7,6]], // Small left
    [[14,14],[14,15],[15,14],[16,14]], // Small right
    // Wave-specific unique layouts
    [[5,8],[5,9],[6,8],[7,8],[8,8]], // Horizontal corridor
    [[12,8],[12,9],[13,8],[14,8],[15,8]], // Mirror corridor
    [[8,12],[9,12],[10,12],[11,12]], // Cross path
    [[6,5],[6,6],[7,5],[8,5],[8,6]], // L-shape
  ];

  // Wave determines which pattern set to use
  const wavePatternSet=(wv%5);
  const patternIdx=Math.floor(Math.random()*patterns.length);
  const patternsToUse=2+Math.floor(wv/5);
  for(let pi=0;pi<patternsToUse&&pi<patterns.length;pi++){
    const pat=patterns[(patternIdx+pi+wavePatternSet)%patterns.length];
    for(const[px,py]of pat){
      if(py<bH&&px<bG){
        if(Math.random()<0.35+Math.min(wv*0.02,0.3)){
          steels[py][px]=1;
        }else{
          bricks[py][px]=1;
        }
      }
    }
  }

  // Water features (wave 2+)
  if(wv>=2){
    for(let i=0;i<3;i++){
      const wx=Math.floor(Math.random()*(bG-4))+2;
      const wy=Math.floor(Math.random()*(bH-6))+3;
      for(let dy=0;dy<2;dy++){
        for(let dx=0;dx<2;dx++){
          if(wy+dy<bH&&wx+dx<bG){
            waters[wy+dy][wx+dx]=1;
          }
        }
      }
    }
  }

  // Forest hiding spots (wave 3+)
  if(wv>=3){
    for(let i=0;i<6;i++){
      const fx=Math.floor(Math.random()*(bG-2))+1;
      const fy=Math.floor(Math.random()*(bH-4))+2;
      forests[fy][fx]=1;
    }
  }

  // Mud terrain (slows tanks) - wave 4+
  if(wv>=4){
    for(let i=0;i<4;i++){
      const mx=Math.floor(Math.random()*(bG-4))+2;
      const my=Math.floor(Math.random()*(bH-6))+3;
      for(let dy=0;dy<2;dy++){
        for(let dx=0;dx<2;dx++){
          if(my+dy<bH&&mx+dx<bG)muds[my+dy][mx+dx]=1;
        }
      }
    }
  }

  // Ice terrain (sliding) - wave 5+
  if(wv>=5){
    for(let i=0;i<3;i++){
      const ix=Math.floor(Math.random()*(bG-4))+2;
      const iy=Math.floor(Math.random()*(bH-6))+3;
      for(let dy=0;dy<2;dy++){
        for(let dx=0;dx<2;dx++){
          if(iy+dy<bH&&ix+dx<bG)ices[iy+dy][ix+dx]=1;
        }
      }
    }
  }

  // Cliff terrain (impassable) - wave 6+
  if(wv>=6){
    for(let i=0;i<2;i++){
      const cx=Math.floor(Math.random()*(bG-4))+2;
      const cy=Math.floor(Math.random()*(bH-6))+3;
      if(cy<bH&&cx<bG)cliffs[cy][cx]=1;
    }
  }

  // Bridge terrain (over water) - wave 7+
  if(wv>=7&&wv>=2){
    for(let i=0;i<2;i++){
      const bx=Math.floor(Math.random()*(bG-4))+2;
      const by=Math.floor(Math.random()*(bH-6))+3;
      for(let dy=0;dy<2;dy++){
        for(let dx=0;dx<2;dx++){
          if(by+dy<bH&&bx+dx<bG&&waters[by+dy]&&waters[by+dy][bx+dx]){
            bridges[by+dy][bx+dx]=1;
            waters[by+dy][bx+dx]=0;
          }
        }
      }
    }
  }

  // Clear base area again
  const baseTX=Math.floor(G/2)-1;
  const baseTY=GH-2;
  for(let dy=0;dy<2;dy++){
    for(let dx=0;dx<2;dx++){
      bricks[baseTY+dy][baseTX+dx]=0;
      steels[baseTY+dy][baseTX+dx]=0;
      waters[baseTY+dy][baseTX+dx]=0;
      muds[baseTY+dy][baseTX+dx]=0;
      ices[baseTY+dy][baseTX+dx]=0;
      cliffs[baseTY+dy][baseTX+dx]=0;
    }
  }
  // Add defensive steel walls around base (wave 3+)
  if(wv>=3){
    // Left wall
    steels[baseTY][baseTX-1]=1;
    steels[baseTY+1][baseTX-1]=1;
    // Right wall
    steels[baseTY][baseTX+2]=1;
    steels[baseTY+1][baseTX+2]=1;
    // Top corners
    steels[baseTY-1][baseTX]=1;
    steels[baseTY-1][baseTX+1]=1;
  }
  base={x:baseTX*TS,y:baseTY*TS+HUD_H,alive:true,hp:3,maxHp:3};
  invalidateTerrainCache(); // R72: invalidate cache when map changes
}

function drawMap(){
  // R72: Use cached terrain for static elements
  if(!terrainCacheValid){
    renderTerrainToCache();
  }
  // Draw cached terrain (static elements)
  ctx.drawImage(terrainCanvas,0,HUD_H);
  // Draw dynamic water tiles (animated)
  for(let y=0;y<GH;y++){
    for(let x=0;x<G;x++){
      const px=x*TS,py=y*TS+HUD_H;
      if(waters[y]&&waters[y][x]>0){
        ctx.fillStyle=C.water;
        ctx.fillRect(px,py,TS,TS);
        const wt=Date.now()/200;
        ctx.fillStyle=C.waterDark;
        ctx.fillRect(px+2,py+2+Math.sin(wt+x)*2,TS-4,2);
        ctx.fillRect(px+2,py+TS/2+Math.sin(wt+x+1)*2,TS-4,2);
        ctx.fillRect(px+2,py+TS-4+Math.sin(wt+x+2)*2,TS-4,2);
      }
    }
  }
  // Draw base (always dynamic) - R78: damage visual feedback
  if(base&&base.alive){
    const bx=base.x,by=base.y-HUD_H;
    // Damage cracks overlay based on HP
    const hpRatio=base.hp/base.maxHp;
    ctx.fillStyle=hpRatio>0.66?C.base:(hpRatio>0.33?'#c80':'#a50');
    ctx.fillRect(bx,by,TS*2,TS*2);
    ctx.fillStyle=hpRatio>0.66?C.baseDark:(hpRatio>0.33?'#a60':'#830');
    ctx.fillRect(bx+2,by+2,TS*2-4,TS*2-4);
    // Damage cracks when HP low
    if(hpRatio<0.66){
      ctx.strokeStyle='#000';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(bx+5,by+5);ctx.lineTo(bx+TS-5,by+TS+5);
      ctx.moveTo(bx+TS+5,by+5);ctx.lineTo(bx+TS-5,by+TS+5);
      if(hpRatio<0.33){
        ctx.moveTo(bx+TS/2,by+2);ctx.lineTo(bx+TS/2,by+TS*2-2);
        ctx.moveTo(bx+2,by+TS);ctx.lineTo(bx+TS*2-2,by+TS);
      }
      ctx.stroke();
    }
    // Smoke when critically damaged
    if(hpRatio<0.33&&Math.random()<0.1){
      const p=getParticle();
      p.reset(bx+Math.random()*TS*2,by+TS,'#333',2);
      p.vy=-0.5-Math.random()*0.5;
      p.vx=(Math.random()-0.5)*0.5;
      p.size=3+Math.random()*2;
      p.life=40;p.maxLife=40;
      particles.push(p);
    }
    ctx.fillStyle=C.base;
    const flag=Date.now()/300;
    ctx.fillRect(bx+TS-1,by,2,TS*2);
    ctx.fillStyle='#c00';
    ctx.beginPath();
    ctx.moveTo(bx+TS+1,by+2);
    ctx.lineTo(bx+TS-4+Math.sin(flag)*2,by+8);
    ctx.lineTo(bx+TS+1,by+14);
    ctx.closePath();
    ctx.fill();
  }else if(base){
    ctx.fillStyle='#400';
    ctx.fillRect(base.x,base.y-HUD_H,TS*2,TS*2);
    ctx.fillStyle='#600';
    ctx.font='bold 16px Arial';
    ctx.textAlign='center';
    ctx.fillText('X',base.x+TS,base.y-HUD_H+TS);
  }
}

function spawnEnemy(){
  // Boss wave every 5 waves
  const isBossWave=wave%5===0&&enemiesLeft===totalEnemies;
  if(isBossWave){
    // Boss warning siren
    if(!muted){
      [300,350,300,400].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.2,0.15),i*100));
    }
    // Spawn boss in center
    const boss=new Tank(GW/2-TS,-TS,2,false);
    boss.type=4; // Boss type
    boss.isBoss=true;
    boss.speed=1.0+wave*0.05;
    boss.maxSpeed=boss.speed;
    boss.hp=10+wave*2;
    boss.maxHp=boss.hp;
    boss.tankColor='#f0f'; // Purple boss
    boss.w=TS*1.5; // Larger size
    boss.h=TS*1.5;
    boss.aiDir=2;
    boss.spawnTimer=30; // R102: Boss has longer spawn flicker
    enemies.push(boss);
    screenShake=15;
    flashTimer=15;
    flashColor='rgba(255,0,255,0.4)';
    return;
  }

  // R81: Enemy formation system
  const formations=['line','v','diamond','flank','random'];
  const formation=formations[wave%formations.length];
  const types=[0,1,2,3];
  const type=types[Math.floor(Math.random()*types.length)];
  const speeds=[1.0+wave*0.1,1.6+wave*0.08,0.8+wave*0.05,1.2+wave*0.1];
  const colors=['#c00','#c60','#c30','#933','#09f','#f69']; // More enemy colors
  // Get spawn position based on formation
  const getFormationPos=(idx)=>{
    const baseX=G/2;
    if(formation==='line')return baseX+(idx%5-2)*2;
    if(formation==='v')return baseX+(idx%5-2)*(idx<5?1:1);
    if(formation==='diamond')return baseX+(idx%5-2)*2;
    if(formation==='flank')return idx%2===0?3:G-3;
    return 2+Math.floor(Math.random()*(G-4)); // random
  };
  const sx=getFormationPos(enemies.length)*TS;
  const enemy=new Tank(sx,-TS,2,false);
  enemy.type=type;
  enemy.spawnTimer=20; // R102: Spawn flicker effect - 0.33s of flickering
  enemy.formation=formation; // R81: track formation
  let baseSpeed=Math.min(speeds[type]*difficultyModifier,3.5);
  // R105: Size variation by type - heavy tanks bigger, scouts smaller
  enemy.sizeScale=type===2?1.15:(type===0?0.9:1.0);
  // Rage mode: 50% speed boost
  if(waveRageMode)baseSpeed*=1.5;
  enemy.speed=baseSpeed;
  enemy.maxSpeed=baseSpeed;
  // Difficulty affects enemy HP (min 1 HP)
  enemy.hp=Math.max(1,Math.floor((3-enemy.type)*difficultyModifier));
  enemy.maxHp=enemy.hp;
  enemy.tankColor=colors[type];
  enemy.aiDir=2;
  enemies.push(enemy);
}

function spawnPowerup(x,y){
  // Balance: reduce powerup spawn rate
  if(Math.random()>0.3)return;
  const types=['life','rapid','big','shield','star','grenade','mine','frozen','repair','invis','megaShield','2xScore'];
  // Weighted selection
  const weights=[0.1,0.16,0.16,0.08,0.14,0.12,0.12,0.12];
  let r=Math.random(),cum=0;
  let type='star';
  for(let i=0;i<types.length;i++){
    cum+=weights[i];
    if(r<cum){type=types[i];break;}
  }
  powerups.push(new PowerUp(x,y,type));
}

// R116: Performance limits
const MAX_PARTICLES=200;
const MAX_EXPLOSIONS=30;

function createExplosion(x,y,big=false){
  // R116: Limit explosions for performance
  if(explosions.length>=MAX_EXPLOSIONS)return;
  const e=getExplosion();
  e.reset(x,y,big);
  explosions.push(e);
  // R116: Limit particle count for performance
  // R132: Enhanced explosion particles with glow and trails
  const remainingSlots=MAX_PARTICLES-particles.length;
  if(remainingSlots<=0)return;
  const particleCount=Math.min(big?40:15,remainingSlots);
  for(let i=0;i<particleCount;i++){
    const col=C.exp[Math.floor(Math.random()*5)];
    const p=getParticle();
    p.reset(x,y,col,big?10:6,true,big?10:6);
    particles.push(p);
  }
  // Add white flash particles - capped with glow
  const flashCount=Math.min(big?15:5,remainingSlots-particleCount);
  for(let i=0;i<flashCount;i++){
    const p=getParticle();
    p.reset(x,y,'#fff',big?6:3,true,4);
    particles.push(p);
  }
  // R132: Add ember particles with longer trails for big explosions
  if(big){
    const emberCount=Math.min(20,remainingSlots-particleCount-flashCount);
    for(let i=0;i<emberCount;i++){
      const p=getParticle();
      p.reset(x,y,'#f80',4+Math.random()*3,true,15);
      p.vx=(Math.random()-0.5)*8;
      p.vy=(Math.random()-0.5)*8-2;
      p.size=2+Math.random()*3;
      p.life=30+Math.random()*20;
      p.maxLife=p.life;
      particles.push(p);
    }
  }
  if(big){
    screenShake=15;
    flashTimer=8;
    flashColor='rgba(255,200,100,0.3)';
  }else{
    screenShake=Math.max(screenShake,4);
  }
}

function checkBulletCollision(b){
  const gx=Math.floor(b.x/TS),gy=Math.floor((b.y-HUD_H)/TS);
  if(gx<0||gx>=G||gy<0||gy>=GH)return false;
  if(bricks[gy]&&bricks[gy][gx]>0){
    bricks[gy][gx]=0;
    playHit();
    createExplosion(b.x,b.y);
    // 砖墙碎屑粒子 - brown debris
    spawnBrickDebris(gx*TS+TS/2,gy*TS+HUD_H+TS/2);
    return true;
  }
  if(steels[gy]&&steels[gy][gx]>0){
    if(b.big){
      steels[gy][gx]=0;
      playHit();
      createExplosion(b.x,b.y);
      return true;
    }
    playHit();
    // 钢墙黄色火花
    spawnSteelSparks(b.x,b.y);
    return true;
  }
  // 水面涟漪效果
  if(waters[gy]&&waters[gy][gx]>0){
    spawnWaterRipple(b.x,b.y);
    playSplash();
    return true;
  }
  return false;
}

function spawnBrickDebris(x,y){
  // 砖墙碎屑 - brown/tan particles
  const colors=['#b87333','#8b4513','#cd853f','#a0522d'];
  for(let i=0;i<8;i++){
    const p=getParticle();
    p.reset(x,y,colors[Math.floor(Math.random()*colors.length)],6);
    p.vx=(Math.random()-0.5)*10;
    p.vy=(Math.random()-0.5)*10-2;
    p.size=2+Math.random()*3;
    p.life=20+Math.random()*15;
    p.maxLife=p.life;
    particles.push(p);
  }
}

function spawnSteelSparks(x,y){
  // 钢墙黄色火花 - yellow/orange sparks
  const sparkColors=['#ff0','#ffa500','#ff8c00','#ffff00'];
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*5;
    const p=getParticle();
    p.reset(x,y,sparkColors[Math.floor(Math.random()*sparkColors.length)],speed);
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
    p.size=1+Math.random()*2;
    p.life=10+Math.random()*10;
    p.maxLife=p.life;
    p.draw=function(){
      ctx.save();
      ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
      ctx.fillStyle=this.col;
      ctx.shadowColor=this.col;
      ctx.shadowBlur=4;
      ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
      ctx.restore();
    };
    particles.push(p);
  }
}

// 水波纹对象池
const ripplePool=[];
const MAX_RIPPLES=30;
function spawnWaterRipple(x,y){
  // 查找可用波纹或创建新的
  let ripple=ripplePool.find(r=>!r.alive);
  if(!ripple&&ripplePool.length<MAX_RIPPLES){
    ripple={alive:true,x:0,y:0,radius:0,maxRadius:20,alpha:1};
    ripplePool.push(ripple);
  }
  if(ripple){
    ripple.alive=true;
    ripple.x=x;
    ripple.y=y;
    ripple.radius=2;
    ripple.maxRadius=15+Math.random()*10;
    ripple.alpha=0.8;
    ripple.life=0;
  }
}

function checkTankHit(b,tank){
  return b.x>tank.x&&b.x<tank.x+TS&&b.y>tank.y&&b.y<tank.y+TS;
}

function checkBaseHit(b){
  if(!base||!base.alive)return false;
  return b.x>base.x&&b.x<base.x+TS*2&&b.y>base.y&&b.y<base.y+TS*2;
}

function applyPowerup(pu,tank){
  playPowerup();
  const puFlashColors={life:'rgba(255,0,0,0.3)',rapid:'rgba(255,255,0,0.3)',big:'rgba(255,128,0,0.3)',shield:'rgba(0,0,255,0.3)',star:'rgba(0,255,255,0.3)',grenade:'rgba(0,255,0,0.3)',mine:'rgba(255,0,255,0.3)',frozen:'rgba(0,200,255,0.4)'};
  if(puFlashColors[pu]){
    flashTimer=10;
    flashColor=puFlashColors[pu];
  }
  if(pu==='life'){
    if(lives<5)lives++;
    updateLivesDisplay();
  }else if(pu==='rapid'){
    rapidTimer=Math.min(rapidTimer+600,1800); // 时间叠加，最大30秒
    if(tank)tank.rapid=true;
  }else if(pu==='big'){
    bigBulletTimer=Math.min(bigBulletTimer+600,1800);
    if(tank)tank.bigBullet=true;
  }else if(pu==='shield'){
    shieldTimer=Math.min(shieldTimer+300,900); // 时间叠加，最大15秒
    if(tank){tank.shield=true;tank.shieldTimer=shieldTimer;}
    playShield();
  }else if(pu==='star'){
    if(tank){
      tank.level=Math.min(3,tank.level+1);
      showLevelUp(tank.level);
      if(tank.level===3)playLevelUp();
      updateTankLevel();
    }
  }else if(pu==='grenade'){
    grenadeCount++;
  }else if(pu==='mine'){
    mineCount++;
  }else if(pu==='frozen'){
    frozenTimer=Math.min(frozenTimer+300,600); // 冻结敌人5-10秒
  }else if(pu==='repair'){
    if(base&&base.alive&&base.hp<base.maxHp){
      base.hp=Math.min(base.maxHp,base.hp+1);
      updateHUD();
      // Repair effect
      flashTimer=10;
      flashColor='rgba(0,255,0,0.3)';
      playPowerup();
    }
  }else if(pu==='invis'){
    // Invisibility - player becomes invisible to enemies for 8 seconds
    if(tank){
      tank.invisible=true;
      tank.invisibleTimer=480; // 8 seconds
    }
  }else if(pu==='megaShield'){
    // Mega shield - full protection for 15 seconds
    shieldTimer=Math.min(shieldTimer+900,1200);
    if(tank){tank.shield=true;tank.shieldTimer=1200;}
    playShield();
  }else if(pu==='2xScore'){
    // Double score for 15 seconds
    comboMultiplier*=2;
    flashTimer=10;
    flashColor='rgba(255,215,0,0.3)';
    setTimeout(()=>{comboMultiplier/=2;},15000);
  }
}

const puIcons={life:'♥',rapid:'⚡',big:'●',shield:'🛡',star:'★',grenade:'💣',mine:'💥',skill1:'⚡',skill2:'⏱'};
const puColors={life:'#f00',rapid:'#ff0',big:'#f80',shield:'#00f',star:'#0ff',grenade:'#0f0',mine:'#f0f',skill1:'#0cf',skill2:'#cf0'};
function updatePowerupStatus(){
  const container=document.getElementById('powerup-status');
  if(!container)return;
  container.innerHTML='';

  // 闪烁警告（低于3秒=180帧时闪烁）
  puBlinkTimer=(puBlinkTimer+1)%30;
  const isBlinking=(timer)=>timer>0&&timer<=180&&puBlinkTimer<15;

  const addPu=(timer,name,maxTimer)=>{
    if(timer<=0)return;
    const percent=(timer/maxTimer)*100;
    const div=document.createElement('div');
    div.className='pu-icon';
    const blink=isBlinking(timer);
    div.style.cssText=`background:${puColors[name]};box-shadow:0 0 6px ${puColors[name]};opacity:${blink?0.5+puBlinkTimer/30:1}`;
    div.innerHTML=`${puIcons[name] || '?'}<div class="pu-bar"><div class="pu-bar-fill" style="width:${percent}%;background:${puColors[name]}"></div></div>`;
    container.appendChild(div);
  };

  addPu(rapidTimer,'rapid',1200);
  addPu(bigBulletTimer,'big',1200);
  addPu(shieldTimer,'shield',600);
  // R82: Skill cooldowns
  if(skill1Cooldown>0)addPu(skill1Cooldown,'skill1',SKILL1_CD);
  if(skill2Cooldown>0)addPu(skill2Cooldown,'skill2',SKILL2_CD);
  // 手雷数量显示
  if(grenadeCount>0){
    const div=document.createElement('div');
    div.className='pu-icon';

    div.style.cssText=`background:transparent;border:2px solid #0f0;box-shadow:0 0 6px #0f0;color:#0f0;font-weight:bold`;
    container.appendChild(div);

  // 地雷数量显示

    const div=document.createElement('div');
    div.className='pu-icon';
    div.textContent=`⚓×${mineCount}`;
    div.style.cssText=`background:transparent;border:2px solid #f0f;box-shadow:0 0 6px #f0f;color:#f0f;font-weight:bold`;
    container.appendChild(div);
  }
}

function useGrenade(){

  for(const e of enemies){
    if(e.alive){
      tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));

      createExplosion(e.cx,e.cy,true);

  let moved=false;
  if(keys['ArrowUp']){player.move(0);moved=true;}
  else if(keys['ArrowRight']){player.move(1);moved=true;}
  else if(keys['ArrowDown']){player.move(2);moved=true;}
  else if(keys['ArrowLeft']){player.move(3);moved=true;}

    const b=player.shoot();

  if(keys['KeyQ'])activateSkill1();
  if(keys['KeyF'])activateSkill2();

  player.shieldTimer=300; // 5秒无敌时间 (300 frames @ 60fps)
  player.invincible=300;
  if(rapidTimer>0)player.rapid=true;
  if(bigBulletTimer>0)player.bigBullet=true;
  if(shieldTimer>0){player.shield=true;player.shieldTimer=shieldTimer;}
  player.level=Math.max(1,player.level);
  updateTankLevel();
  // 出生粒子效果
  spawnRespawnParticles(player.cx, player.cy);
}

function spawnRespawnParticles(x,y){
  // 蓝色保护光环粒子
  for(let i=0;i<20;i++){
    const angle=(Math.PI*2/20)*i;
    const speed=2+Math.random()*2;
    const p=getParticle();
    p.reset(x,y,'#0cf',speed*0.8);
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
    p.life=50;
    p.maxLife=50;
    p.size=4;
    p.draw=function(){
      ctx.save();
      ctx.globalAlpha=Math.max(0,this.life/this.maxLife)*0.8;
      ctx.fillStyle='#0cf';
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*(this.life/this.maxLife+0.3),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    };
    particles.push(p);
  }
}

}

        mmCtx.fillRect(x/G*80,y/GH*60,80/G+0.5,60/GH+0.5);
      }

        mmCtx.fillStyle='#148';
        mmCtx.fillRect(x/G*80,y/GH*60,80/G+0.5,60/GH+0.5);
      }
    }
  }
  if(base&&base.alive){
    mmCtx.fillStyle='#00f';
    mmCtx.fillRect(base.x/GW*80,base.y/(H-HUD_H)*60,5,5);

    mmCtx.strokeStyle=hpRatio>0.5?'#0f0':(hpRatio>0.25?'#ff0':'#f00');
    mmCtx.lineWidth=1;
    mmCtx.beginPath();
    mmCtx.arc(base.x/GW*80+2.5,base.y/(H-HUD_H)*60+2.5,4,0,Math.PI*2*hpRatio);
    mmCtx.stroke();
  }
  // R89: Draw powerups on minimap
  powerups.forEach(p=>{
    if(p.alive){
      mmCtx.fillStyle='#ff0';
      mmCtx.fillRect(p.x/GW*80-1,p.y/(H-HUD_H)*60-1,3,3);
    }

  // Draw enemies on minimap - different colors by type
  enemies.forEach(e=>{
    if(e.alive){
      const ex=e.x/GW*80,ey=e.y/(H-HUD_H)*60;
      if(e.isBoss){

        mmCtx.fillRect(ex-3,ey-3,6,6);
        mmCtx.strokeStyle='#f0f';
        mmCtx.lineWidth=1;

        mmCtx.fillRect(ex-2,ey-2,4,4);
      }

  });

  bullets.forEach(b=>{
    if(b.alive){
      mmCtx.fillStyle=b.big?'#f80':'#ff0';
      mmCtx.fillRect(b.x/GW*80,b.y/(H-HUD_H)*60,2,2);

  if(player2&&player2.alive)player2.drawMinimap();
  // R89: Minimap border color indicates danger level
  const danger=enemies.filter(e=>e.alive&&!e.isBoss).length;
  if(danger>10){
    mmCtx.strokeStyle='#f00';
    mmCtx.lineWidth=2;
    mmCtx.strokeRect(0,0,80,60);
  }
}

function drawRipples(){
  // 更新和绘制水面涟漪
  for(const ripple of ripplePool){
    if(!ripple.alive)continue;
    ripple.life++;
    ripple.radius+=(ripple.maxRadius-ripple.radius)*0.15;
    ripple.alpha-=0.03;
    if(ripple.alpha<=0){
      ripple.alive=false;
      continue;
    }
    ctx.save();
    ctx.globalAlpha=ripple.alpha;
    ctx.strokeStyle='#4cf';
    ctx.lineWidth=1.5;
    ctx.shadowColor='#4cf';
    ctx.shadowBlur=4;
    ctx.beginPath();
    ctx.arc(ripple.x,ripple.y,ripple.radius,0,Math.PI*2);
    ctx.stroke();
    // 第二层涟漪
    if(ripple.radius>5){
      ctx.globalAlpha=ripple.alpha*0.5;
      ctx.beginPath();
      ctx.arc(ripple.x,ripple.y,ripple.radius*0.6,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }
}
