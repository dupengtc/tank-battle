// Draw bullet trajectory prediction
function drawBulletPrediction(tank){
  const bulletSpeed=tank.bigBullet||tank.level>=3?8:6;
  let px=tank.cx,py=tank.cy;
  const dir=tank.dir;
  // Starting position offset
  if(dir===0)py=tank.y-6;
  else if(dir===1)px=tank.x+TS;
  else if(dir===2)py=tank.y+TS;
  else px=tank.x-6;

  const vx=dir===1?bulletSpeed:dir===3?-bulletSpeed:0;
  const vy=dir===0?-bulletSpeed:dir===2?bulletSpeed:0;

  ctx.save();
  ctx.strokeStyle='rgba(255,255,0,0.5)';
  ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.shadowColor='#ff0';
  ctx.shadowBlur=5;

  let lastX=px,lastY=py;
  for(let i=0;i<50;i++){
    const nx=px+vx*(i+1);
    const ny=py+vy*(i+1);
    // Check collision with walls
    const gx=Math.floor(nx/TS);
    const gy=Math.floor((ny-HUD_H)/TS);
    if(gx<0||gx>=G||gy<0||gy>=GH||(bricks[gy]&&bricks[gy][gx]>0)||(steels[gy]&&steels[gy][gx]>0)){
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(nx,ny);
      ctx.stroke();
      // Draw impact marker
      ctx.beginPath();
      ctx.arc(nx,ny,4,0,Math.PI*2);
      ctx.stroke();
      break;
    }
    lastX=nx;lastY=ny;
    if(i%5===0){
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(nx,ny);
      ctx.stroke();
    }
  }
  ctx.restore();
}

/* =============================================================
   MODULE: Game Loop & Rendering
   ============================================================= */
function update(){
  if(gameState!=='playing')return;
  gameTime++;
  survivalTime++;
  if(flashTimer>0)flashTimer--;
  if(screenShake>0)screenShake*=0.85;
  // R73: Build spatial hash for collision optimization
  spatialClear();
  for(const b of bullets)if(b.active)spatialInsert(b,'bullet');
  for(const e of enemies)if(e.alive)spatialInsert(e,'enemy');
  if(player&&player.alive)spatialInsert(player,'player');
  if(player2&&player2.alive)spatialInsert(player2,'player');
  for(const p of powerups)if(p.alive)spatialInsert(p,'powerup');
  // R82: Decrement skill cooldowns
  if(skill1Cooldown>0)skill1Cooldown--;
  if(skill2Cooldown>0)skill2Cooldown--;
  // 连击计时
  if(comboTimer>0){
    comboTimer--;
    if(comboTimer<=0){
      comboCount=0;
      comboMultiplier=1;
    }
  }

  // Achievement tracking
  updateAchievements();
  updateToasts(); // R90

  // Sync shield timer to player
  if(player){
    player.shieldTimer=shieldTimer;
    if(player.invincible>0)player.invincible--;
  }
  if(player2&&player2.invincible>0)player2.invincible--;

  if(shieldTimer>0){
    shieldTimer--;
    if(player)player.shield=shieldTimer>0;
    if(player2)player2.shield=shieldTimer>0;
  }
  if(rapidTimer>0){
    rapidTimer--;
    if(player)player.rapid=rapidTimer>0;
    if(player2)player2.rapid=rapidTimer>0;
  }
  if(bigBulletTimer>0){
    bigBulletTimer--;
    if(player)player.bigBullet=bigBulletTimer>0;
    if(player2)player2.bigBullet=bigBulletTimer>0;
  }

  // Spawn enemies - only after wave transition countdown
  if(waveTransitionTimer>0){
    waveTransitionTimer--;
    waveTransitionCountdown=Math.ceil(waveTransitionTimer/60);
  } else {
    spawnTimer++;
    if(spawnQueue.length>0&&spawnTimer>=spawnQueue[0].delay){
      spawnQueue.shift();
      if(enemiesLeft>0){
        spawnEnemy();
        enemiesLeft--;
        updateHUD();
      }
    }
  }

  // Time challenge - count down wave time
  if(waveTimeRemaining>0&&!waveRageMode&&gameState==='playing'&&waveTransitionTimer<=0){
    waveTimeRemaining--;
    if(waveTimeRemaining<=0){
      // Rage mode activated!
      waveRageMode=true;
      rageFlashTimer=60;
      screenShake=10;
    }
  }

  // Update rage flash timer
  if(rageFlashTimer>0)rageFlashTimer--;

  const waveSpawnDone=spawnQueue.length===0&&enemiesLeft===0&&enemies.length===0;
  if(waveSpawnDone&&gameState==='playing'){
    nextWave();
  }

  // Player input
  handlePlayerInput();
  if(isTwoPlayer)handlePlayer2Input();

  // Update tank physics (acceleration, inertia, sliding)
  if(player)player.updatePhysics();
  if(player2&&player2.alive)player2.updatePhysics();

  // Frozen effect timer
  if(frozenTimer>0){
    frozenTimer--;
    // Visual frozen effect overlay
    ctx.save();
    ctx.globalAlpha=0.1;
    ctx.fillStyle='#0cf';
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }

  // Enemy AI (affected by frozen timer)
  enemies.forEach(e=>{
    // R102: Decrement spawn flicker timer
    if(e.spawnTimer>0)e.spawnTimer--;
    if(frozenTimer>0){
      // Slow down frozen enemies
      const originalSpeed=e.speed;
      e.speed*=0.3;
      e.ai();
      e.speed=originalSpeed;
    }else{
      e.ai();
    }
  });

  // Update bullets
  bullets.forEach(b=>b.update());
  bullets=bullets.filter(b=>b.alive);

  // Bullet collisions
  for(const b of bullets){
    if(checkBulletCollision(b)){b.alive=false;continue;}
    if(checkBaseHit(b)){b.alive=false;playHit();createExplosion(b.x,b.y,true);base.hp--;updateHUD();
      // R106: Base damage warning - red edge flash
      flashTimer=15;flashColor='rgba(255,50,0,0.5)';screenShake=10;
      if(base.hp<=0){base.alive=false;playExplode(true);createExplosion(base.x+TS,base.y+TS,true);gameOver(false);return;}
    }

    // Player bullets hit enemies
    if(b.isPlayer||b.isPlayer2){
      for(const e of enemies){
        if(e.alive&&checkTankHit(b,e)){
          b.alive=false;
          shotsHit++;
          // Enemy aggro: remember who hit this enemy
          e.aggroTarget=b.isPlayer?'player1':'player2';
          e.aggroTime=300;
          // HP-based damage
          const bulletDamage=1;
          e.hp=(e.hp||1)-bulletDamage;
          if(e.hp<=0){
            e.alive=false;
            killCount++;
            // 坦克裂解动画
            tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
            // 连击系统
            comboCount++;
            comboTimer=180;
            if(comboCount>=10)comboMultiplier=3;
            else if(comboCount>=5)comboMultiplier=2;
            else if(comboCount>=3)comboMultiplier=1.5;
            const damage=Math.floor(100*(e.type+1)*comboMultiplier);
            score+=damage;
            wavePerformanceScore+=damage;
            // Player XP and leveling (beyond star powerups)
            if(b.isPlayer&&player){
              player.xp=(player.xp||0)+20*(e.type+1);
              if(player.xp>=100&&player.level<4){
                player.level=Math.min(4,player.level+1);
                player.xp=0;
                showLevelUp(player.level);
                updateTankLevel();
              }
            }
            if(b.isPlayer2&&player2){
              player2.xp=(player2.xp||0)+20*(e.type+1);
              if(player2.xp>=100&&player2.level<4){
                player2.level=Math.min(4,player2.level+1);
                player2.xp=0;
              }
            }
            // 伤害数字飘字
            damageNumbers.push(new DamageNumber(e.cx,e.cy-10,damage,comboCount>=3));
            playExplode();
            createExplosion(e.cx,e.cy,true); // 大爆炸
            hitStopTimer=3; // 0.05秒hit-stop
            killFlashTimer=15; // 击杀边缘闪光
            spawnPowerup(e.x,e.y);
            enemiesLeft=Math.max(0,enemiesLeft-1);
            updateHUD();
          }
          break;
        }
      }
    }else{
      // Enemy bullets - check both players
      const checkHit=(p)=>{
        if(p&&p.alive&&p.invincible<=0&&!p.shield&&checkTankHit(b,p)){
          b.alive=false;
          p.alive=false;
          playDie();
          createExplosion(p.cx,p.cy,true);
          return true;
        }
        return false;
      };
      if(checkHit(player)) {
        lives--;waveDeaths++;waveDamageTaken++;
        updateLivesDisplay();
        if(lives<=0){
          gameOver(false);
          return;
        }
        setTimeout(respawnPlayer,1500);
      } else if(isTwoPlayer&&checkHit(player2)){
        lives--;waveDeaths++;waveDamageTaken++;
        updateLivesDisplay();
        if(lives<=0){
          gameOver(false);
          return;
        }
        setTimeout(respawnPlayer2,1500);
      }
    }
  }

  // Enemy collision with players
  for(const e of enemies){
    if(!e.alive)continue;
    const checkCollision=(p,isP2)=>{
      if(p&&p.alive&&p.invincible<=0&&!p.shield&&Math.abs(e.cx-p.cx)<TS*0.8&&Math.abs(e.cy-p.cy)<TS*0.8){
        p.alive=false;
        playDie();
        createExplosion(p.cx,p.cy,true);
        return true;
      }
      return false;
    };
    if(checkCollision(player)){
      if(isTwoPlayer&&player2&&player2.alive&&!playerDead){
        // Co-op revival: player 1 downed instead of losing life
        playerDead=true;
        revivalTimer=600; // 10 seconds to revive
      }else{
        lives--;
        updateLivesDisplay();
        if(lives<=0){gameOver(false);return;}
        setTimeout(respawnPlayer,1500);
      }
    }else if(isTwoPlayer&&checkCollision(player2)){
      if(isTwoPlayer&&player&&player.alive&&!player2Dead){
        // Co-op revival: player 2 downed instead of losing life
        player2Dead=true;
        revivalTimer=600;
      }else{
        lives--;
        updateLivesDisplay();
        if(lives<=0){gameOver(false);return;}
        setTimeout(respawnPlayer2,1500);
      }
    }
  }

  enemies=enemies.filter(e=>e.alive);

  // Powerup collection
  powerups.forEach(p=>p.update());
  powerups=powerups.filter(p=>p.alive);

  const collectPowerup=(p,tank)=>{
    if(p.alive&&tank&&tank.alive&&Math.abs(tank.cx-(p.x+TS/2))<TS&&Math.abs(tank.cy-(p.y+TS/2))<TS){
      p.alive=false;
      p.triggerPickupAnimation(); // R79: pickup animation
      applyPowerup(p.type,tank);
    }
  };

  if(player)powerups.forEach(p=>collectPowerup(p,player));
  if(player2)powerups.forEach(p=>collectPowerup(p,player2));

  // Co-op powerup sharing: when one player gets a powerup, nearby teammate gets partial benefit
  if(isTwoPlayer&&player&&player2&&player.alive&&player2.alive){
    const dx=Math.abs(player.cx-player2.cx);
    const dy=Math.abs(player.cy-player2.cy);
    const nearby=dx<TS*4&&dy<TS*4;
    if(nearby){
      // Share shield time
      if(player.shieldTimer>player2.shieldTimer+60){
        player2.shieldTimer=Math.min(player.shieldTimer,player2.shieldTimer+60);
        player2.shield=true;
      }
      // Share rapid fire
      if(rapidTimer>0){
        player2.rapid=true;
      }
    }
  }

  // Co-op revival system
  if(isTwoPlayer&&(playerDead||player2Dead)){
    revivalTimer--;
    if(revivalTimer<=0){
      // Auto-revive after timeout
      if(playerDead){
        playerDead=false;
        lives--;
        updateLivesDisplay();
        if(lives<=0){gameOver(false);return;}
        setTimeout(respawnPlayer,1500);
      }
      if(player2Dead){
        player2Dead=false;
        lives--;
        updateLivesDisplay();
        if(lives<=0){gameOver(false);return;}
        setTimeout(respawnPlayer2,1500);
      }
    }
    // Check for manual revival with R key
    if(keys['KeyR']){
      if(playerDead&&player2&&player2.alive){
        // Player 2 revives Player 1
        const dx=Math.abs(player2.cx-player.cx);
        const dy=Math.abs(player2.cy-player.cy);
        if(dx<TS*2&&dy<TS*2){
          playerDead=false;
          player.alive=true;
          player.x=player2.x;
          player.y=player2.y-TS*2;
          player.invincible=120;
          player.shieldTimer=120;
          revivalTimer=0;
          playShield();
        }
      }
      if(player2Dead&&player&&player.alive){
        // Player 1 revives Player 2
        const dx=Math.abs(player.cx-player2.cx);
        const dy=Math.abs(player.cy-player2.cy);
        if(dx<TS*2&&dy<TS*2){
          player2Dead=false;
          player2.alive=true;
          player2.x=player.x;
          player2.y=player.y-TS*2;
          player2.invincible=120;
          player2.shieldTimer=120;
          revivalTimer=0;
          playShield();
        }
      }
    }
  }

  // Mine collision with enemies
  for(let i=mines.length-1;i>=0;i--){
    const m=mines[i];
    m.update();
    if(!m.alive){mines.splice(i,1);continue;}
    // Check enemy collision
    for(const e of enemies){
      if(m.checkHit(e)){
        m.alive=false;
        createExplosion(m.x+TS/2,m.y+TS/2,true);
        playExplode(true);
        screenShake=15;
        e.hp=(e.hp||1)-3;
        if(e.hp<=0){
          e.alive=false;
          tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
          const damage=Math.floor(100*(e.type+1)*comboMultiplier);
          score+=damage;
          wavePerformanceScore+=damage;
          damageNumbers.push(new DamageNumber(e.cx,e.cy-10,damage,false));
          killCount++;
          enemiesLeft=Math.max(0,enemiesLeft-1);
          spawnPowerup(e.x,e.y);
        }
        break;
      }
    }
  }
  mines=mines.filter(m=>m.alive);

  // Update explosions and particles
  explosions.forEach(e=>e.update());
  explosions=explosions.filter(e=>e.alive);
  tankDebris.forEach(d=>d.update());
  tankDebris=tankDebris.filter(d=>d.alive);
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>p.alive);
  damageNumbers.forEach(d=>d.update());
  damageNumbers=damageNumbers.filter(d=>d.alive);
  tireTrails.forEach(t=>t.update());
  tireTrails=tireTrails.filter(t=>t.alive);
}

/* =============================================================
   MODULE: Main Game Loop
   ============================================================= */
let lastTime=0;
let fps=0,fpsFrames=0,fpsTimer=0,showFps=false;
let highContrast=false;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  // R74: Smooth deltaTime with accumulator pattern
  const rawDt=ts-lastTime;
  lastTime=ts;
  // Clamp to avoid spiral of death
  const dt=Math.min(rawDt,50);
  // FPS calculation
  fpsFrames++;
  fpsTimer+=dt;
  if(fpsTimer>=1000){
    fps=fpsFrames;
    fpsFrames=0;
    fpsTimer=0;
  }
  // Hit-stop pause
  if(hitStopTimer>0){hitStopTimer--;return;}
  // R74: No longer skip frames - accumulator handles timing
  if(!gameLoop.accumulator)gameLoop.accumulator=0;
  gameLoop.accumulator+=dt;
  const TICK=16.67; // 60 FPS fixed step
  // Slow motion
  const timeScale=slowMotionTimer>0?(slowMotionTimer>6?0.25:0.5):1;
  if(slowMotionTimer>0)slowMotionTimer--;
  // Process updates with accumulator
  if(gameState==='playing'||slowMotionTimer>0){
    while(gameLoop.accumulator>=TICK){
      if(gameState==='playing')update();
      gameLoop.accumulator-=TICK*timeScale;
      if(gameLoop.accumulator<0)gameLoop.accumulator=0;
    }
  }
  // R75: Periodic memory cleanup every 10 seconds
  if(!gameLoop.cleanupTimer)gameLoop.cleanupTimer=0;
  gameLoop.cleanupTimer+=dt;
  if(gameLoop.cleanupTimer>=10000){
    gameLoop.cleanupTimer=0;
    // Clean up pool objects that are no longer needed
    bulletPool.forEach(b=>{if(!b.active)b.alive=false;});
    particlePool.forEach(p=>{if(!p.active)p.alive=false;});
    explosionPool.forEach(e=>{if(!e.active)e.alive=false;});
    // Limit tire trails
    if(tireTrails.length>50)tireTrails=tireTrails.slice(-50);
  }
  updateBgParticles();
  updateMuteIndicator();
  updateWeather();
  ctx.save();
  if(screenShake>0.5){
    ctx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*2);
  }
  draw();
  if(showFps){
    ctx.fillStyle='#0f0';
    ctx.font='12px Courier New';
    ctx.fillText(`FPS:${fps}`,5,20);
  }
  if(gameState==='start'||gameState==='gameover'){
    drawBgParticles();
  }
  animateScoreGain(); // 得分放大动画
  ctx.restore();
  if(flashTimer>0){
    ctx.save();
    ctx.fillStyle=flashColor;
    ctx.globalAlpha=flashTimer/30;
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
  // Kill edge flash
  if(killFlashTimer>0){
    killFlashTimer--;
    const alpha=killFlashTimer/15*0.6;
    ctx.save();
    ctx.globalAlpha=alpha;
    const grad=ctx.createRadialGradient(GW/2,H/2,0,GW/2,H/2,GW*0.7);
    grad.addColorStop(0,'transparent');
    grad.addColorStop(0.7,'transparent');
    grad.addColorStop(1,'rgba(255,100,50,0.8)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
  drawMinimap();
  drawWeather();
  drawAchievements();
  drawToasts(); // R90: Toast notifications
  if(showCareerStats)drawCareerStats();
}

// 开始画面背景粒子
let bgParticles=[];
let bgParticleActive=false;
function startBgParticles(){
  bgParticles=[];
  bgParticleActive=true;
  for(let i=0;i<30;i++){
    bgParticles.push({
      x:Math.random()*GW,
      y:Math.random()*(H-HUD_H),
      vx:(Math.random()-0.5)*0.5,
      vy:(Math.random()-0.5)*0.5,
      size:1+Math.random()*2,
      alpha:0.2+Math.random()*0.3,
      color:Math.random()>0.5?'#0f0':'#ff0'
    });
  }
}
function updateBgParticles(){
  if(!bgParticleActive)return;
  for(const p of bgParticles){
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0)p.x=GW;
    if(p.x>GW)p.x=0;
    if(p.y<0)p.y=H-HUD_H;
    if(p.y>H-HUD_H)p.y=0;
  }
}
function drawBgParticles(){
  if(!bgParticleActive)return;
  for(const p of bgParticles){
    ctx.save();
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
function stopBgParticles(){
  bgParticleActive=false;
}

/* =============================================================
   MODULE: Event Listeners & Initialization
   ============================================================= */
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space')spaceHeld=true;
  if(e.code==='Enter'){
    if(shopActive){
      // R84: Close shop and resume
      closeShop();
      document.getElementById('msg').style.display='none';
    }else if(gameState==='start'||gameState==='gameover'||gameState==='victory'){
      // Level selection with arrow keys
      if(e.code==='ArrowRight'||e.code==='ArrowUp'){
        selectedLevel=selectedLevel%5+1;
        if(selectedLevel>unlockedLevels)selectedLevel=1;
        showStartScreen();
      }else if(e.code==='ArrowLeft'||e.code==='ArrowDown'){
        selectedLevel--;
        if(selectedLevel<1)selectedLevel=unlockedLevels;
        showStartScreen();
      }else if(e.shiftKey){
        startGame(true);
      }else{
        startGame(false);
      }
    }else if(gameState==='playing'){
      gameState='paused';
      stopBgMusic();
      const msg=document.getElementById('msg');
      msg.innerHTML=`<h1 style="font-size:28px">暂停</h1><h2>PAUSED</h2><p class="blink">[ PRESS ENTER 继续 ]</p>`;
      msg.style.display='block';
    }else if(gameState==='paused'){
      gameState='playing';
      document.getElementById('msg').style.display='none';
      startBgMusic();
    }
  }
  if(e.code==='KeyM'){
    muted=!muted;
    localStorage.setItem('tankMuted',muted);
    if(muted)stopBgMusic();else if(gameState==='playing')startBgMusic();
    showMuteIndicator();
  }
  if(e.code==='KeyC'){
    showCareerStats=!showCareerStats;
  }
  if(e.code==='KeyG'){
    useGrenade();
  }
  if(e.code==='KeyB'){
    placeMine();
  }
  if(e.code==='KeyF'){
    showFps=!showFps;
  }
  if(e.code==='KeyH'){
    highContrast=!highContrast;
    document.body.classList.toggle('high-contrast',highContrast);
  }
  if(e.code==='KeyP'||e.code==='Escape'){
    // R86: Pause menu with ESC or P
    if(gameState==='playing'){
      gameState='paused';
      stopBgMusic();
      const msg=document.getElementById('msg');
      // R112: Show stats during pause
      const accuracy=shotsFired>0?Math.round(shotsHit/shotsFired*100):0;
      msg.innerHTML=`
        <h1 style="font-size:32px;color:#ff0">PAUSED</h1>
        <div style="background:rgba(0,0,0,0.5);padding:10px;margin:10px 0;border:1px solid #ff0;text-align:left">
          <p style="color:#fff">SCORE: ${formatScore(score)}</p>
          <p style="color:#fff">WAVE: ${wave}</p>
          <p style="color:#fff">ENEMIES KILLED: ${killCount}</p>
          <p style="color:#fff">ACCURACY: ${accuracy}%</p>
        </div>
        <div style="margin:10px 0">
          <p onclick="resumeGame()" class="blink" style="cursor:pointer;color:#0f0;font-size:16px">[ RESUME ]</p>
          <p onclick="restartWave()" style="cursor:pointer;color:#ff0;font-size:14px;margin-top:10px">[ RESTART WAVE ]</p>
          <p onclick="showSettings()" style="cursor:pointer;color:#ff0;font-size:14px;margin-top:8px">[ SETTINGS ]</p>
          <p onclick="quitToMenu()" style="cursor:pointer;color:#f44;font-size:14px;margin-top:8px">[ QUIT TO MENU ]</p>
        </div>
        <p style="color:#666;font-size:12px">ESC or P to resume</p>
      `;
      msg.style.display='block';
    }
  }
  function resumeGame(){
    gameState='playing';
    document.getElementById('msg').style.display='none';
    startBgMusic();
  }
  function restartWave(){
    enemies=[];bullets=[];explosions=[];powerups=[];particles=[];
    for(let i=0;i<Math.min(4,totalEnemies);i++){spawnQueue.push({delay:i*spawnInterval});}
    enemiesLeft=totalEnemies;spawnTimer=0;
    gameState='playing';
    document.getElementById('msg').style.display='none';
    startBgMusic();
  }
  function quitToMenu(){
    gameState='start';
    showStartScreen();
    document.getElementById('msg').style.display='none';
    stopBgMusic();
  }
  function showSettings(){
    const msg=document.getElementById('msg');
    msg.innerHTML=`
      <h2 style="color:#ff0">SETTINGS</h2>
      <div style="text-align:left;margin:10px 0">
        <p onclick="toggleMute();showSettings()" style="cursor:pointer;color:${muted?'#f44':'#0f0'};font-size:14px">[ SOUND: ${muted?'OFF':'ON'} ]</p>
        <p onclick="toggleHighContrast();showSettings()" style="cursor:pointer;color:#ff0;font-size:14px;margin-top:8px">[ CONTRAST: ${highContrast?'HIGH':'NORMAL'} ]</p>
        <p onclick="toggleFPS();showSettings()" style="cursor:pointer;color:#ff0;font-size:14px;margin-top:8px">[ FPS: ${showFps?'ON':'OFF'} ]</p>
        <p onclick="toggleFullscreen()" style="cursor:pointer;color:#0ff;font-size:14px;margin-top:8px">[ FULLSCREEN ]</p>
      </div>
      <p onclick="resumeGame()" class="blink" style="color:#0f0;margin-top:20px">[ BACK ]</p>
    `;
    msg.style.display='block';
  }
  function toggleMute(){
    muted=!muted;
    localStorage.setItem('tankMuted',muted.toString());
    if(muted)stopBgMusic();else if(gameState==='playing')startBgMusic();
  }
  function toggleHighContrast(){
    highContrast=!highContrast;
    document.body.classList.toggle('high-contrast',highContrast);
  }
  function toggleFPS(){
    showFps=!showFps;
  }
  function toggleFullscreen(){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)){
    e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='Space')spaceHeld=false;
});

updateTankLevel();
showStartScreen();
generateMap(1);

// Touch controls for mobile
let touchStartX=0,touchStartY=0,touchControlActive=false;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  touchStartX=touch.clientX;
  touchStartY=touch.clientY;
  touchControlActive=true;
  // Tap to shoot
  if(gameState==='playing'&&player&&player.alive){
    const b=player.shoot();
    if(b){bullets.push(b);shotsFired++;}
  }else if(gameState==='start'||gameState==='gameover'){
    keys['Enter']=true;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!touchControlActive||gameState!=='playing')return;
  const touch=e.touches[0];
  const dx=touch.clientX-touchStartX;
  const dy=touch.clientY-touchStartY;
  const threshold=20;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>threshold)keys['ArrowRight']=true;
    else if(dx<-threshold)keys['ArrowLeft']=true;
  }else{
    if(dy>threshold)keys['ArrowDown']=true;
    else if(dy<-threshold)keys['ArrowUp']=true;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touchControlActive=false;
  keys['ArrowUp']=false;keys['ArrowDown']=false;
  keys['ArrowLeft']=false;keys['ArrowRight']=false;
},{passive:false});

requestAnimationFrame(gameLoop);
</script>
