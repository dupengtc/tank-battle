<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 Battle City</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace}
  #wrap{position:relative;display:inline-block}
  #c{background:#000;display:block;image-rendering:pixelated;border:2px solid #333}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.03);pointer-events:none;z-index:2;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)}
  #scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15),rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:3;opacity:0.4}
  #vignette{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:3}
  #crt-effect{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;mix-blend-mode:screen;opacity:0.03}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:6px 12px;background:rgba(0,0,0,0.85);color:#0f0;font-size:13px;z-index:4;border-bottom:1px solid #333;font-family:'Courier New',monospace}
  .hud-item{display:flex;align-items:center;gap:8px}
  .hud-label{color:#888;font-size:11px;letter-spacing:1px}
  .hud-val{color:#0f0;font-weight:bold;min-width:40px;text-shadow:0 0 6px #0f0}
  .hud-val.red{color:#f44;text-shadow:0 0 6px #f44}
  .hud-val.gold{color:#fd0;text-shadow:0 0 6px #fd0}
  #msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;display:none;pointer-events:none}
  #msg h1{font-size:36px;color:#0f0;text-shadow:0 0 20px #0f0,0 0 40px #0a0;margin-bottom:16px;letter-spacing:4px;animation:glow 2s ease-in-out infinite}
  #msg h2{font-size:20px;color:#ff0;text-shadow:0 0 10px #ff0;margin-bottom:12px}
  #msg p{color:#aaa;font-size:13px;line-height:1.8}
  #msg .blink{animation:blink 1s infinite}
  #msg .btn-hint{animation:btnPulse 1.5s ease-in-out infinite;cursor:pointer;transition:transform 0.2s}
  #msg .btn-hint:hover{transform:scale(1.1);color:#0f0}
  @keyframes glow{0%,100%{text-shadow:0 0 20px #0f0,0 0 40px #0a0,0 0 60px #0f0}50%{text-shadow:0 0 30px #0f0,0 0 60px #0a0,0 0 80px #0f0}}
  @keyframes btnPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .lives{display:flex;gap:4px}
  .life-icon{width:14px;height:14px;background:#0f0;clip-path:polygon(50% 0%,100% 30%,100% 100%,0 100%,0 30%);box-shadow:0 0 4px #0f0}
  .life-icon.dead{background:#333;box-shadow:none}
  #level-up{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#ff0;font-size:24px;font-weight:bold;text-shadow:0 0 20px #ff0;z-index:6;display:none;animation:fadeUp 1s ease-out forwards}
  @keyframes fadeUp{0%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-150%) scale(1)}}
  #minimap{position:absolute;bottom:4px;right:4px;width:80px;height:60px;border:1px solid #0f0;z-index:4;opacity:0.8;background:rgba(0,20,0,0.9)}
  .hud-sep{width:1px;height:20px;background:#333;margin:0 4px}
  #powerup-status{min-height:20px}
  .pu-icon{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;overflow:visible}
  .pu-icon .pu-bar{position:absolute;bottom:-4px;left:0;width:100%;height:3px;background:#333;border-radius:1px}
  .pu-icon .pu-bar-fill{height:100%;border-radius:1px;transition:width 0.1s}
  body.high-contrast #c{filter:contrast(1.5)brightness(1.2)}
  body.high-contrast .hud-val{color:#fff;text-shadow:0 0 10px #fff}
  body.high-contrast .enemy{filter:contrast(1.5)}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">WAVE</span>
      <span class="hud-val gold" id="wave">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ENEMIES</span>
      <span class="hud-val red" id="enemies">0</span>
    </div>
    <div class="hud-item" id="enemy-preview">
      <span class="hud-label">NEXT</span>
      <span id="enemy-types"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-val" id="tank-level">1</span>
      <span id="tank-stars" style="color:#ff0;text-shadow:0 0 6px #ff0;font-size:12px;margin-left:-4px">★</span>
    </div>
    <div class="hud-item" id="combo-display" style="display:none">
      <span class="hud-label">COMBO</span>
      <span class="hud-val gold" id="combo-count">0</span>
      <span class="hud-val" id="combo-mult" style="color:#f0f">x1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <div class="lives" id="lives-display"></div>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-val gold" id="hiscore">0</span>
    </div>
    <div id="powerup-status" style="display:flex;gap:6px;align-items:center;margin-left:8px"></div>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="msg">
    <h1>坦克大战</h1>
    <h2>BATTLE CITY</h2>
    <p>玩家1: 方向键移动 | 空格射击</p>
    <p>玩家2: WASD移动 | X射击 (双人模式)</p>
    <p>按 ENTER 开始游戏</p>
    <p class="blink" style="margin-top:16px;color:#0f0">[ PRESS ENTER ]</p>
  </div>
  <div id="level-up"></div>
  <canvas id="minimap"></canvas>
</div>
<script>
/* =============================================================
   MODULE: Constants & Configuration
   ============================================================= */
const W=800,H=600,TS=24,G=Math.floor(W/TS),HUD_H=36,GW=TS*G,GH=Math.floor((H-HUD_H)/TS);
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap');
const mmCtx=mm.getContext('2d');
canvas.width=GW;canvas.height=H-HUD_H;
mm.width=80;mm.height=60;

// Game state
let gameState='start',score=0,hiScore=0,lives=3,wave=1,enemiesLeft=0,totalEnemies=0,spawnQueue=[];
let player,player2,enemies=[],bullets=[],explosions=[],powerups=[],particles=[],tankDebris=[],damageNumbers=[],tireTrails=[];
let bricks=[],steels=[],waters=[],forests=[],base;
let keys={},muted=localStorage.getItem('tankMuted')==='true';
let lastShot=0,lastShotCd=350;
let gameTime=0,spawnTimer=0,spawnInterval=120;
let shieldTimer=0,rapidTimer=0,bigBulletTimer=0,grenadeCount=0,mineCount=0;
let puBlinkTimer=0;
let comboCount=0,comboTimer=0,comboMultiplier=1;
let screenShake=0,flashTimer=0,flashColor='rgba(255,255,0,0.3)';
let slowMotionTimer=0,hitStopTimer=0;
let audioCtx=null;
let isTwoPlayer=false;
let mines=[];
let killCount=0,shotsFired=0,shotsHit=0,survivalTime=0;
let restartPromptTimer=0;
let killFlashTimer=0;

// Weather system
let weatherType=0; // 0=none, 1=rain, 2=snow
let weatherParticles=[];
let weatherTimer=0;
const MAX_WEATHER=80;

// Save system
let unlockedLevels=parseInt(localStorage.getItem('tankUnlockedLevels'))||1;
let savedHiScore=parseInt(localStorage.getItem('tankHiScore'))||0;
let selectedLevel=1;

// Load saved hi-score on startup
if(savedHiScore>hiScore)hiScore=savedHiScore;

// Save game data
function saveGameData(){
  localStorage.setItem('tankHiScore',hiScore.toString());
  localStorage.setItem('tankUnlockedLevels',unlockedLevels.toString());
  localStorage.setItem('tankMuted',muted.toString());
}

// Unlock next level
function unlockNextLevel(){
  const nextLevel=wave+1;
  if(nextLevel>unlockedLevels&&nextLevel<=5){
    unlockedLevels=nextLevel;
    saveGameData();
  }
}

// Wave transition
let waveTransitionTimer=0;
let waveTransitionCountdown=0;

// Bullet prediction
let spaceHeld=false;

// Object pools
const bulletTrailPool=[];
const MAX_BULLET_TRAILS=100;
const MAX_BULLETS=100;
const MAX_PARTICLES=200;
const bulletPool=[];
const particlePool=[];

const C={
  brick:'#b87333',brickDark:'#8b4513',brickLight:'#cd853f',
  steel:'#708090',steelLight:'#a9a9a9',
  water:'#1a5',waterDark:'#148',
  forest:'#2d5',grass:'#234',
  base:'#daa520',baseDark:'#b8860b',
  bullet:'#ff0',bulletBig:'#f80',
  enemy:['#c00','#c60','#c30','#933'],
  player:'#4a4',playerDark:'#383',
  exp:['#fff','#ff0','#f80','#f00','#800'],
  pu:{life:'#f00',rapid:'#ff0',big:'#f80',shield:'#00f',star:'#0ff'}
};

/* =============================================================
   MODULE: Audio System
   ============================================================= */
function initAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
function playTone(freq,type,dur,vol=0.15){
  if(muted||!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playShoot(big=false){
  const freq=big?(280+Math.random()*40):(480+Math.random()*60);
  playTone(freq,'square',0.08,0.1);
  if(big)playTone(freq*0.5,'square',0.1,0.05);
}
function playExplode(big=false){
  const baseFreq=big?60:100;
  playTone(baseFreq,'sawtooth',big?0.4:0.25,big?0.25:0.15);
  playTone(baseFreq*1.5,'square',big?0.3:0.2,big?0.15:0.1);
  playTone(baseFreq*0.5,'sawtooth',big?0.5:0.3,big?0.1:0.08);
}
function playPowerup(){
  playTone(600,'sine',0.08,0.12);
  setTimeout(()=>playTone(800,'sine',0.08,0.12),60);
  setTimeout(()=>playTone(1000,'sine',0.08,0.12),120);
  setTimeout(()=>playTone(1400,'sine',0.15,0.15),180);
}
function playHit(){playTone(200+Math.random()*50,'square',0.12,0.18);}
function playStart(){[400,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.15),i*100));}
function playDie(){
  playTone(400,'sawtooth',0.1,0.15);
  setTimeout(()=>playTone(300,'sawtooth',0.1,0.12),100);
  setTimeout(()=>playTone(180,'sawtooth',0.25,0.1),200);
}
function playShield(){playTone(500,'sine',0.15);setTimeout(()=>playTone(700,'sine',0.2),80);}
function playLevelUp(){
  [500,600,700,800,900,1000,1200].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.08),i*50));
}
function playWin(){[500,600,800,1000,1200].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.12),i*100));}
function playSplash(){playTone(120+Math.random()*40,'sine',0.12,0.08);}

/* Background Music System */
let bgMusicPlaying=false;
let bgMusicIntervalId=null;
const bgMusicNotes=[262,294,330,349,392,440,494,523,494,440,392,349,330,294];
let bgMusicIndex=0;

function startBgMusic(){
  if(bgMusicPlaying||muted)return;
  bgMusicPlaying=true;
  bgMusicIndex=0;
  const playNote=()=>{
    if(!bgMusicPlaying||muted){stopBgMusic();return;}
    const note=bgMusicNotes[bgMusicIndex%bgMusicNotes.length];
    playTone(note,'square',0.15,0.04);
    bgMusicIndex++;
  };
  playNote();
  bgMusicIntervalId=setInterval(playNote,200);
}
function stopBgMusic(){
  bgMusicPlaying=false;
  if(bgMusicIntervalId){clearInterval(bgMusicIntervalId);bgMusicIntervalId=null;}
}
function playWaveFanfare(){
  const fanfare=[400,500,600,800,1000];
  fanfare.forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.12,0.1),i*80));
  setTimeout(()=>playTone(1200,'square',0.25,0.12),400);
}
let muteIndicatorTimer=0;
function showMuteIndicator(){
  muteIndicatorTimer=60;
}
function updateMuteIndicator(){
  if(muteIndicatorTimer>0){
    muteIndicatorTimer--;
    const wrap=document.getElementById('wrap');
    if(wrap){
      const existing=document.getElementById('mute-badge');
      if(muteIndicatorTimer>0&&muted){
        if(!existing){
          const badge=document.createElement('div');
          badge.id='mute-badge';
          badge.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#f44;font-size:24px;padding:15px 25px;border:2px solid #f44;z-index:10;border-radius:8px';
          badge.textContent='🔇 静音';
          wrap.appendChild(badge);
        }
      }else if(existing){
        existing.remove();
      }
    }
  }
}

/* =============================================================
   MODULE: Entity Classes (Tank, Bullet, Explosion, Particle, etc.)
   ============================================================= */
function spawnMuzzleFlash(x,y,dir){
  const colors=['#ff0','#f80','#f44','#fff'];
  const dirOffsets={0:{vx:0,vy:-1},1:{vx:1,vy:0},2:{vx:0,vy:1},3:{vx:-1,vy:0}};
  const offset=dirOffsets[dir];
  for(let i=0;i<6;i++){
    const p=new Particle(x,y,colors[Math.floor(Math.random()*colors.length)],3);
    p.vx=(offset.vx*3+(Math.random()-0.5)*3);
    p.vy=(offset.vy*3+(Math.random()-0.5)*3);
    p.size=2+Math.random()*2;
    p.life=5+Math.random()*5;
    p.maxLife=p.life;
    p.draw=function(){
      ctx.save();
      ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
      ctx.fillStyle=this.col;
      ctx.shadowColor=this.col;
      ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*(this.life/this.maxLife+0.5),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    };
    particles.push(p);
  }
}

function spawnDust(x,y,dir){
  const dustColors=['#a08060','#806040','#605040','#909070'];
  const dirAngles={0:Math.PI/2,1:Math.PI,2:-Math.PI/2,3:0};
  const baseAngle=dirAngles[dir]+Math.PI+(Math.random()-0.5)*0.8;
  const speed=1+Math.random()*2;
  const p=new Particle(x,y,dustColors[Math.floor(Math.random()*dustColors.length)],speed);
  p.vx=Math.cos(baseAngle)*speed;
  p.vy=Math.sin(baseAngle)*speed;
  p.size=2+Math.random()*2;
  p.life=15+Math.random()*10;
  p.maxLife=p.life;
  p.draw=function(){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life/this.maxLife)*0.6;
    ctx.fillStyle=this.col;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*(0.5+this.life/this.maxLife*0.5),0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  };
  particles.push(p);
}

// Weather system
function updateWeather(){
  weatherTimer++;
  // Change weather every 20-40 seconds
  if(weatherTimer>1200+Math.random()*600){
    weatherTimer=0;
    weatherType=Math.floor(Math.random()*3); // 0=none, 1=rain, 2=snow
    weatherParticles=[];
  }
  // Spawn weather particles
  if(weatherType>0&&weatherParticles.length<MAX_WEATHER){
    const x=Math.random()*GW;
    const y=-5;
    const speed=weatherType===1?(4+Math.random()*3):(1+Math.random()*1.5);
    weatherParticles.push({
      x:x,y:y,
      vx:weatherType===1?1:0,
      vy:speed,
      life:60+Math.random()*60,
      size:weatherType===1?(1+Math.random()):(2+Math.random()*2)
    });
  }
  // Update particles
  for(let i=weatherParticles.length-1;i>=0;i--){
    const p=weatherParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life--;
    if(p.life<=0||p.y>H){
      weatherParticles.splice(i,1);
    }
  }
}

function drawWeather(){
  if(weatherType===0)return;
  ctx.save();
  for(const p of weatherParticles){
    const alpha=Math.min(1,p.life/30)*0.5;
    ctx.globalAlpha=alpha;
    if(weatherType===1){
      // Rain
      ctx.strokeStyle='#aaf';
      ctx.lineWidth=p.size;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+p.vx*3,p.y+p.vy*3);
      ctx.stroke();
    }else{
      // Snow
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
  // Weather visibility effect
  if(weatherType===2){
    // Snow - slight dimming
    ctx.save();
    ctx.globalAlpha=0.1;
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
}

class Tank{
  constructor(x,y,dir,isPlayer=false,isPlayer2=false){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;this.isPlayer2=isPlayer2;
    this.w=TS;this.h=TS;this.speed=isPlayer?2.5:(isPlayer2?2.2:1.2+wave*0.1);
    this.shotCd=isPlayer?350:500;this.lastShot=0;this.alive=true;
    this.type=0;this.aiTimer=0;this.aiDir=dir;this.stuck=0;this.lastX=x;this.lastY=y;
    this.level=1;this.shield=false;this.shieldTimer=0;this.invincible=0;this.rapid=false;this.bigBullet=false;
    this.tankColor=isPlayer?C.player:(isPlayer2?'#44d':C.enemy[0]);
    this.shootCount=0;
    this.flashTimer=0;
    this.flashRed=0;
    // Movement physics - acceleration and inertia
    this.vx=0;this.vy=0;
    this.acceleration=isPlayer?0.4:0.3;
    this.friction=0.85;
    this.maxSpeed=this.speed;
  }
  get cx(){return this.x+TS/2}
  get cy(){return this.y+TS/2}
  canShoot(){
    const now=Date.now();
    const cd=this.rapid?120:(this.isPlayer||this.isPlayer2)?this.shotCd:500;
    return now-this.lastShot>cd;
  }
  shoot(){
    const now=Date.now();
    if(!this.canShoot())return null;
    this.lastShot=now;
    let bx,by,bd;
    const big=this.bigBullet||this.level>=3;
    if(this.dir===0){bx=this.cx-2;by=this.y-6}
    else if(this.dir===1){bx=this.x+TS;by=this.cy-2}
    else if(this.dir===2){bx=this.cx-2;by=this.y+TS}
    else{bx=this.x-6;by=this.cy-2}
    playShoot(big);
    // 枪口火焰粒子
    spawnMuzzleFlash(bx,by,this.dir);
    return new Bullet(bx,by,this.dir,this.isPlayer,big,this.isPlayer2);
  }
  collidesMap(tx,ty){
    const gx=Math.floor(tx/TS),gy=Math.floor((ty-HUD_H)/TS);
    if(gx<0||gx>=G||gy<0||gy>=GH)return true;
    if(bricks[gy]&&bricks[gy][gx]>0)return true;
    if(steels[gy]&&steels[gy][gx]>0)return true;
    if(waters[gy]&&waters[gy][gx]>0)return true;
    return false;
  }
  canMove(tx,ty){
    const s=TS-2;
    const corners=[
      [tx+1,ty+1],[tx+s,ty+1],[tx+1,ty+s],[tx+s,ty+s]
    ];
    for(const[cx,cy]of corners)if(this.collidesMap(cx,cy))return false;
    if(tx<0||tx+TS>GW||ty<0||ty+TS>H-HUD_H)return false;
    return true;
  }
  move(d){
    if(!this.alive)return;
    this.dir=d;
    // Apply acceleration in the desired direction
    if(d===0)this.vy-=this.acceleration;
    else if(d===1)this.vx+=this.acceleration;
    else if(d===2)this.vy+=this.acceleration;
    else this.vx-=this.acceleration;
  }
  updatePhysics(){
    if(!this.alive)return;
    // Apply friction
    this.vx*=this.friction;
    this.vy*=this.friction;
    // Clamp velocity
    const speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(speed>this.maxSpeed){
      this.vx=(this.vx/speed)*this.maxSpeed;
      this.vy=(this.vy/speed)*this.maxSpeed;
    }
    // Stop if very slow
    if(Math.abs(this.vx)<0.05)this.vx=0;
    if(Math.abs(this.vy)<0.05)this.vy=0;
    // Try to move with velocity
    let tx=this.x+this.vx,ty=this.y+this.vy;
    if(this.canMove(tx,ty)){
      this.x=tx;this.y=ty;
      this.stuck=0;
      // Dust particles when moving fast enough
      if(speed>1&&Math.random()<0.2)spawnDust(this.cx,this.cy,this.dir);
      // Tire trails - only for players and when moving
      if(speed>0.5&&Math.random()<0.15&&tireTrails.length<200){
        tireTrails.push(new TireTrail(this.x,this.y,this.dir,this.isPlayer||this.isPlayer2));
      }
    }else{
      // Hit wall - try to slide along it
      if(this.canMove(this.x+this.vx,this.y)){
        this.x+=this.vx;this.stuck=0;
      }else if(this.canMove(this.x,this.y+this.vy)){
        this.y+=this.vy;this.stuck=0;
      }else{
        this.stuck++;
        this.vx=0;this.vy=0;
      }
    }
    this.lastX=this.x;this.lastY=this.y;
  }
  ai(){
    if(this.isPlayer||this.isPlayer2)return;
    this.aiTimer++;
    const targets=player&&player.alive?[player]:[];
    if(isTwoPlayer&&player2&&player2.alive)targets.push(player2);
    if(targets.length===0)return;

    // Find closest target
    let px=targets[0].x,py=targets[0].y,td=Math.abs(px-this.x)+Math.abs(py-this.y);
    for(const t of targets){
      const d=Math.abs(t.x-this.x)+Math.abs(t.y-this.y);
      if(d<td){px=t.x;py=t.y;td=d;}
    }

    const dx=px-this.x,dy=py-this.y;

    // Type-based behavior patterns
    const typePatterns={
      0:()=>{this.speed=Math.min(1.2+wave*0.1,2.5);}, // Fast scout - prioritizes speed
      1:()=>{this.speed=Math.min(1.6+wave*0.08,3.0);}, // Medium - balanced
      2:()=>{this.speed=Math.min(0.8+wave*0.05,1.8);}, // Slow heavy - more accurate shooting
      3:()=>{this.speed=Math.min(1.2+wave*0.1,2.2);}  // Standard - adaptive
    };
    if(typePatterns[this.type])typePatterns[this.type]();

    // Smart obstacle avoidance - check ahead before moving
    const aheadDir=(dir)=>{
      const lookDist=TS*2;
      let lx=this.cx,ly=this.cy;
      if(dir===0)ly-=lookDist;
      else if(dir===1)lx+=lookDist;
      else if(dir===2)ly+=lookDist;
      else lx-=lookDist;
      const gx=Math.floor(lx/TS),gy=Math.floor((ly-HUD_H)/TS);
      if(gx<0||gx>=G||gy<0||gy>=GH)return false;
      return (bricks[gy]&&bricks[gy][gx]>0)||(steels[gy]&&steels[gy][gx]>0);
    };

    if(this.stuck>15){
      this.aiDir=(this.aiDir+2)%4;
      this.stuck=0;
    }
    // Smart direction selection with obstacle avoidance
    if(this.aiTimer%6===0){
      const absDx=Math.abs(dx),absDy=Math.abs(dy);
      let preferredDir;
      if(absDx>absDy){
        preferredDir=dx>0?1:3;
      }else{
        preferredDir=dy>0?2:0;
      }
      // If preferred direction is blocked, try alternatives
      if(aheadDir(preferredDir)){
        const alternatives=[(preferredDir+1)%4,(preferredDir+3)%4,(preferredDir+2)%4];
        for(const alt of alternatives){
          if(!aheadDir(alt)){this.aiDir=alt;break;}
        }
      }else{
        this.aiDir=preferredDir;
      }
      // Type 2 (slow heavy) is more cautious - checks both axes
      if(this.type===2&&aheadDir(this.aiDir)){
        const otherAx=absDx>absDy?(dy>0?2:0):(dx>0?1:3);
        if(!aheadDir(otherAx))this.aiDir=otherAx;
      }
      // Add randomness to avoid predictable patterns (varies by type)
      const randChance=this.type===0?0.25:this.type===2?0.1:0.2;
      if(Math.random()<randChance){
        this.aiDir=(this.aiDir+[1,3][Math.floor(Math.random()*2)])%4;
      }
    }
    // Shoot when has line of sight - type 2 (heavy) shoots more frequently
    const shootInterval=this.type===2?12:20;
    if(this.aiTimer%shootInterval===0&&this.canShoot()&&this.hasLineOfSight(px,py)){
      const b=this.shoot();
      if(b)bullets.push(b);
    }
    this.move(this.aiDir);
  }
  hasLineOfSight(targetX,targetY){
    targetX=targetX||(player?player.cx:0);
    targetY=targetY||(player?player.cy:0);
    const cx=this.cx,cy=this.cy;
    const steps=Math.max(Math.abs(targetX-cx),Math.abs(targetY-cy))/TS;
    if(steps<1)return true;
    const sx=(targetX-cx)/steps,sy=(targetY-cy)/steps;
    for(let i=0;i<=steps;i++){
      const tx=cx+sx*i,ty=cy+sy*i;
      const gx=Math.floor(tx/TS),gy=Math.floor((ty-HUD_H)/TS);
      if(gx>=0&&gx<G&&gy>=0&&gy<GH){
        if(bricks[gy]&&bricks[gy][gx]>0)return false;
        if(steels[gy]&&steels[gy][gx]>0)return false;
      }
    }
    return true;
  }
  draw(){
    if(!this.alive)return;
    const x=Math.floor(this.x),y=Math.floor(this.y);
    ctx.save();
    // Invincibility flash - 5秒无敌时半透明闪烁
    if(this.invincible>0){
      const flashPhase=Math.floor(this.invincible/8)%2;
      if(flashPhase===0){
        ctx.globalAlpha=0.4+0.3*Math.sin(this.invincible/5);
      }else{
        ctx.globalAlpha=0.7;
      }
      // 无敌光环效果
      ctx.save();
      ctx.globalAlpha=0.3+0.2*Math.sin(this.invincible/8);
      ctx.strokeStyle='#0cf';
      ctx.lineWidth=2;
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.cx,this.cy,TS*0.9,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    // Flash effect when hit - 红色闪烁
    if(this.flashRed>0){
      ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(this.flashRed/2));
    }
    // Flash effect when hit (damage flash)
    if(this.flashTimer>0){
      ctx.globalAlpha=0.7;
    }
    ctx.translate(x+TS/2,y+TS/2);
    ctx.rotate(this.dir*Math.PI/2);
    ctx.translate(-TS/2,-TS/2);

    // Tank shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(2,2,TS-2,TS-2);

    let col=this.tankColor;
    // 被击中红色闪烁效果
    if(this.flashRed>0){
      col='#f44';
    }
    const dark=this.isPlayer||this.isPlayer2?(this.isPlayer?C.playerDark:'#339'):this.tankColor;

    // Tank body with level-based detail
    ctx.fillStyle=col;
    if(this.level>=2){
      ctx.fillRect(3,3,18,18);
      ctx.fillStyle=dark;
      ctx.fillRect(5,5,14,14);
      ctx.fillStyle=col;
      ctx.fillRect(7,7,10,10);
    }else{
      ctx.fillRect(4,4,16,16);
      ctx.fillStyle=dark;
      ctx.fillRect(6,6,12,12);
      ctx.fillStyle=col;
      ctx.fillRect(8,8,8,8);
    }

    // Tank barrel
    ctx.fillStyle='#555';
    ctx.fillRect(TS/2-2,TS/2-2,4,TS/2+2);

    // Barrel color based on player type
    if(this.isPlayer){
      ctx.fillStyle=this.level>=3?'#ff0':'#8f8';
    }else if(this.isPlayer2){
      ctx.fillStyle=this.level>=3?'#ff0':'#8af';
    }else{
      ctx.fillStyle='#fa0';
    }
    ctx.fillRect(TS/2-1,TS/2,2,TS/2-2);

    // Corner bolts for leveled tanks
    if(this.level>=2){
      ctx.fillStyle='#666';
      ctx.fillRect(2,2,4,4);
      ctx.fillRect(18,2,4,4);
      ctx.fillRect(2,18,4,4);
      ctx.fillRect(18,18,4,4);
    }
    ctx.restore();

    // Shield effect - use global shieldTimer synced to instance
    const showShield=this.shield||(this.shieldTimer>0);
    if(showShield){
      ctx.save();
      ctx.globalAlpha=0.4+0.3*Math.sin(Date.now()/100);
      ctx.strokeStyle='#0cf';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(this.cx,this.cy,TS*0.8,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // Invincibility countdown display (for player respawn protection)
    if(this.invincible>0 && (this.isPlayer||this.isPlayer2)){
      const sec=Math.ceil(this.invincible/60);
      ctx.save();
      ctx.globalAlpha=0.6+0.4*Math.abs(Math.sin(Date.now()/200));
      ctx.fillStyle='#0cf';
      ctx.font='bold 10px Courier New';
      ctx.textAlign='center';
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=6;
      ctx.fillText('★'+sec+'★',this.cx,this.y-6);
      ctx.restore();
    }

    // Update flash timer
    if(this.flashTimer>0)this.flashTimer--;
    if(this.flashRed>0)this.flashRed--;
  }
  drawMinimap(){
    if(!this.alive)return;
    mmCtx.fillStyle=this.isPlayer?'#0f0':(this.isPlayer2?'#44f':'#f44');
    mmCtx.fillRect(this.x/GW*80,this.y/(H-HUD_H)*60,3,3);
  }
}

class Bullet{
  constructor(x,y,dir,isPlayer,big=false,isPlayer2=false){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;this.isPlayer2=isPlayer2;this.big=big;
    this.speed=big?8:6;this.alive=true;this.w=big?6:4;this.h=big?6:4;
    // 缩小10%hitbox防止贴脸误判
    this.hitboxScale=0.9;
    this.trail=[];
  }
  getHitbox(){
    const s=TS*this.hitboxScale;
    return{
      x:this.x-s/2,
      y:this.y-s/2,
      w:s,
      h:s
    };
  }
  update(){
    // Store trail position
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>6)this.trail.shift();

    if(this.dir===0)this.y-=this.speed;
    else if(this.dir===1)this.x+=this.speed;
    else if(this.dir===2)this.y+=this.speed;
    else this.x-=this.speed;
    if(this.x<0||this.x>GW||this.y<0||this.y>H-HUD_H)this.alive=false;
  }
  draw(){
    // Draw trail
    ctx.save();
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const alpha=(i+1)/this.trail.length*0.5;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=this.big?C.bulletBig:C.bullet;
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.big?3:1.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // Draw bullet
    ctx.save();
    ctx.fillStyle=this.big?C.bulletBig:C.bullet;
    ctx.shadowColor=this.big?'#f80':'#ff0';
    ctx.shadowBlur=this.big?10:6;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.big?4:2.5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(this.x-1,this.y-1,this.big?1.5:1,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

class Explosion{
  constructor(x,y,big=false){
    this.x=x;this.y=y;this.big=big;
    this.frame=0;this.maxFrame=big?25:15;
    this.alive=true;
    this.particles=[];
    // Pre-generate explosion particles - orange-red focus
    const expColors=['#f80','#f60','#f40','#f00','#fa0','#fc0','#ff0'];
    const count=big?30:12+Math.floor(Math.random()*4); // 12-15 for normal
    for(let i=0;i<count;i++){
      this.particles.push({
        angle:Math.random()*Math.PI*2,
        speed:Math.random()*(big?8:5)+2,
        size:Math.random()*(big?6:3)+2,
        color:expColors[Math.floor(Math.random()*expColors.length)],
        life:1
      });
    }
  }
  update(){
    this.frame++;
    if(this.frame>=this.maxFrame)this.alive=false;
    // Update particle life
    for(const p of this.particles){
      p.life-=0.05;
    }
  }
  draw(){
    const p=this.frame/this.maxFrame;
    ctx.save();
    const cx=Math.floor(this.x),cy=Math.floor(this.y);

    // Core explosion
    const r=this.big?TS*p*1.8:TS*p*1.2;
    const ci=Math.min(4,Math.floor(p*5));
    ctx.globalAlpha=1-p;
    ctx.fillStyle=C.exp[ci];
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();

    // Outer ring for big explosions
    if(this.big){
      ctx.globalAlpha=(1-p)*0.5;
      ctx.fillStyle=C.exp[Math.min(4,ci+1)];
      ctx.beginPath();
      ctx.arc(cx+Math.cos(Date.now()/50)*3,cy+Math.sin(Date.now()/50)*3,r*0.7,0,Math.PI*2);
      ctx.fill();
    }

    // Particles
    ctx.globalAlpha=1;
    for(const part of this.particles){
      if(part.life<=0)continue;
      const px=cx+Math.cos(part.angle)*part.speed*(1-p)*10;
      const py=cy+Math.sin(part.angle)*part.speed*(1-p)*10;
      ctx.globalAlpha=part.life;
      ctx.fillStyle=part.color;
      ctx.fillRect(px,py,part.size*(1-p*0.5),part.size*(1-p*0.5));
    }
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,col,speed=6){
    this.x=x;this.y=y;this.col=col;
    this.vx=(Math.random()-0.5)*speed;
    this.vy=(Math.random()-0.5)*speed;
    this.life=25+Math.random()*25;
    this.maxLife=this.life;
    this.alive=true;
    this.size=Math.random()*3+1;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vx*=0.92;this.vy*=0.92;
    this.life-=0.8;
    if(this.life<=0)this.alive=false;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
    ctx.fillStyle=this.col;
    const s=Math.floor(this.size*(this.life/this.maxLife)+1);
    ctx.fillRect(Math.floor(this.x),Math.floor(this.y),s,s);
    ctx.restore();
  }
}

// Floating damage number class
class DamageNumber{

// Tank tire trail class
class TireTrail{
  constructor(x,y,dir,isPlayer){
    this.x=x;this.y=y;this.dir=dir;this.isPlayer=isPlayer;
    this.life=60+Math.random()*30;
    this.maxLife=this.life;
    this.alive=true;
    // Two tracks for each tank tread
    const offset=TS/4;
    if(dir===0){this.x1=x+offset;this.y1=y+TS-2;this.x2=x+TS-offset;this.y2=y+TS-2;}
    else if(dir===1){this.x1=x+2;this.y1=y+offset;this.x2=x+2;this.y2=y+TS-offset;}
    else if(dir===2){this.x1=x+offset;this.y1=y+2;this.x2=x+TS-offset;this.y2=y+2;}
    else{this.x1=x+TS-2;this.y1=y+offset;this.x2=x+TS-2;this.y2=y+TS-offset;}
  }
  update(){
    this.life--;
    if(this.life<=0)this.alive=false;
  }
  draw(){
    const alpha=(this.life/this.maxLife)*0.3;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.isPlayer?'#3a3':'#533';
    ctx.fillRect(this.x1-1,this.y1-1,3,3);
    ctx.fillRect(this.x2-1,this.y2-1,3,3);
    ctx.restore();
  }
}

// Mine class - player placed explosive
class Mine{
  constructor(x,y){
    this.x=x;this.y=y;
    this.w=TS;this.h=TS;
    this.alive=true;
    this.timer=0;
    this.maxTimer=180; // 3 seconds to arm
    this.armed=false;
  }
  update(){
    this.timer++;
    if(this.timer>=this.maxTimer)this.armed=true;
  }
  draw(){
    ctx.save();
    const pulse=0.7+0.3*Math.sin(Date.now()/100);
    ctx.translate(this.x+TS/2,this.y+TS/2);
    ctx.scale(pulse,pulse);
    // Mine body
    ctx.fillStyle=this.armed?'#f00':'#660';
    ctx.shadowColor=this.armed?'#f00':'#660';
    ctx.shadowBlur=this.armed?10:5;
    ctx.beginPath();
    ctx.arc(0,0,TS/3,0,Math.PI*2);
    ctx.fill();
    // Spikes
    ctx.fillStyle=this.armed?'#f44':'#880';
    for(let i=0;i<8;i++){
      const angle=(i/8)*Math.PI*2;
      ctx.fillRect(-2,-TS/2,4,TS/4);
      ctx.save();
      ctx.rotate(angle);
      ctx.fillRect(-2,-TS/2,4,TS/4);
      ctx.restore();
    }
    ctx.restore();
  }
  checkHit(tank){
    if(!this.armed||!tank.alive)return false;
    return Math.abs(this.x+TS/2-tank.cx)<TS&&Math.abs(this.y+TS/2-tank.cy)<TS;
  }
}

// 坦克裂解碎片类
class TankDebris{
  constructor(x,y,dir,tankColor){
    this.x=x;this.y=y;this.dir=dir;this.tankColor=tankColor;
    this.frame=0;this.maxFrame=15; // 0.25秒 @ 60fps
    this.alive=true;
    this.w=TS/2;this.h=TS/2;
    // 4个碎片向外扩散
    const angles=[Math.PI*0.25,Math.PI*0.75,Math.PI*1.25,Math.PI*1.75];
    this.pieces=angles.map((angle,i)=>({
      offsetX:(i%2===0?-1:1)*TS/4,
      offsetY:(i<2?-1:1)*TS/4,
      angle:angle,
      speed:4+Math.random()*2,
      rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.3
    }));
  }
  update(){
    this.frame++;
    if(this.frame>=this.maxFrame)this.alive=false;
    // 更新碎片位置
    const progress=this.frame/this.maxFrame;
    for(const p of this.pieces){
      p.offsetX+=Math.cos(p.angle)*p.speed*(1-progress);
      p.offsetY+=Math.sin(p.angle)*p.speed*(1-progress);
      p.rotation+=p.rotSpeed;
    }
  }
  draw(){
    const progress=this.frame/this.maxFrame;
    ctx.save();
    ctx.globalAlpha=1-progress*0.5;
    for(const p of this.pieces){
      const px=this.x+p.offsetX;
      const py=this.y+p.offsetY;
      ctx.save();
      ctx.translate(px,py);
      ctx.rotate(p.rotation);
      ctx.fillStyle=this.tankColor;
      ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
      // 碎片边缘
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(-this.w/2+2,-this.h/2+2,this.w-4,2);
      ctx.restore();
    }
    ctx.restore();
  }
}

/* =============================================================
   MODULE: Map Generation & Rendering
   ============================================================= */
function generateMap(wv){
  bricks=[];steels=[];waters=[];forests=[];
  for(let y=0;y<GH;y++){
    bricks[y]=[];steels[y]=[];waters[y]=[];forests[y]=[];
    for(let x=0;x<G;x++){
      bricks[y][x]=0;steels[y][x]=0;waters[y][x]=0;forests[y][x]=0;
    }
  }
  const bG=G*TS/TS,bH=GH;
  // Bottom wall
  for(let x=1;x<bG-1;x++){
    bricks[bH-1][x]=1;
    if(wv>=2&&x>2&&x<bG-3&&(x%3===0))bricks[bH-2][x]=1;
  }
  bricks[bH-1][0]=0;bricks[bH-1][bG-1]=0;
  // Top wall
  for(let x=0;x<bG;x++){
    bricks[0][x]=1;bricks[1][x]=1;
    bricks[0][x]=0;
  }
  // Side walls
  for(let y=0;y<bH;y++){
    bricks[y][0]=1;bricks[y][bG-1]=1;
  }

  // Clear base area
  const baseX=Math.floor(bG/2)-1;
  const baseY=bH-2;
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      bricks[baseY+dy][baseX+dx]=0;
    }
  }

  // Random brick/steel clusters
  for(let i=0;i<4;i++){
    const ex=Math.floor(Math.random()*(bG-4))+2;
    const ey=Math.floor(Math.random()*(bH-8))+3;
    for(let dy=-1;dy<=1;dy++){
      for(let dx=-1;dx<=1;dx++){
        if(ey+dy>=0&&ey+dy<bH&&ex+dx>=0&&ex+dx<bG){
          if(Math.random()<0.5){
            bricks[ey+dy][ex+dx]=1;
          }else{
            steels[ey+dy][ex+dx]=1;
          }
        }
      }
    }
  }

  // Predefined patterns based on wave
  const patterns=[
    [[2,4],[2,5],[2,6],[3,4],[3,6],[4,4],[4,5],[4,6]],
    [[10,4],[10,5],[10,6],[11,4],[11,6],[12,4],[12,5],[12,6]],
    [[6,10],[6,11],[7,10],[8,10]],
    [[15,10],[15,11],[16,10],[17,10]],
    [[2,16],[2,17],[3,16],[3,17],[2,18],[3,18]],
    [[16,16],[16,17],[17,16],[17,17],[16,18],[17,18]],
    [[5,6],[5,7],[6,6],[7,6]],
    [[14,14],[14,15],[15,14],[16,14]],
  ];

  const patternIdx=Math.floor(Math.random()*patterns.length);
  const patternsToUse=1+wv%3;
  for(let pi=0;pi<patternsToUse;pi++){
    const pat=patterns[(patternIdx+pi)%patterns.length];
    for(const[px,py]of pat){
      if(py<bH&&px<bG){
        if(Math.random()<0.35){
          steels[py][px]=1;
        }else{
          bricks[py][px]=1;
        }
      }
    }
  }

  // Water features (wave 2+)
  if(wv>=2){
    for(let i=0;i<3;i++){
      const wx=Math.floor(Math.random()*(bG-4))+2;
      const wy=Math.floor(Math.random()*(bH-6))+3;
      for(let dy=0;dy<2;dy++){
        for(let dx=0;dx<2;dx++){
          if(wy+dy<bH&&wx+dx<bG){
            waters[wy+dy][wx+dx]=1;
          }
        }
      }
    }
  }

  // Forest hiding spots (wave 3+)
  if(wv>=3){
    for(let i=0;i<6;i++){
      const fx=Math.floor(Math.random()*(bG-2))+1;
      const fy=Math.floor(Math.random()*(bH-4))+2;
      forests[fy][fx]=1;
    }
  }

  // Clear base area again
  const baseTX=Math.floor(G/2)-1;
  const baseTY=GH-2;
  for(let dy=0;dy<2;dy++){
    for(let dx=0;dx<2;dx++){
      bricks[baseTY+dy][baseTX+dx]=0;
      steels[baseTY+dy][baseTX+dx]=0;
      waters[baseTY+dy][baseTX+dx]=0;
    }
  }
  base={x:baseTX*TS,y:baseTY*TS+HUD_H,alive:true};
}

function drawMap(){
  for(let y=0;y<GH;y++){
    for(let x=0;x<G;x++){
      const px=x*TS,py=y*TS+HUD_H;
      if(bricks[y]&&bricks[y][x]>0){
        ctx.fillStyle=C.brick;
        ctx.fillRect(px,py,TS,TS);
        ctx.fillStyle=C.brickDark;
        ctx.fillRect(px+1,py+TS-3,TS-2,3);
        ctx.fillStyle=C.brickLight;
        ctx.fillRect(px+1,py+1,TS-2,1);
        ctx.fillStyle=C.brickDark;
        ctx.fillRect(px+TS/2-1,py,1,TS);
        ctx.fillRect(px,py+TS/2-1,TS,1);
      }
      if(steels[y]&&steels[y][x]>0){
        ctx.fillStyle=C.steel;
        ctx.fillRect(px,py,TS,TS);
        ctx.fillStyle=C.steelLight;
        ctx.fillRect(px+2,py+2,TS-4,TS-4);
        ctx.fillStyle='#556';
        ctx.fillRect(px+TS/2-1,py,1,TS);
        ctx.fillRect(px,py+TS/2-1,TS,1);
      }
      if(waters[y]&&waters[y][x]>0){
        ctx.fillStyle=C.water;
        ctx.fillRect(px,py,TS,TS);
        const wt=Date.now()/200;
        ctx.fillStyle=C.waterDark;
        ctx.fillRect(px+2,py+2+Math.sin(wt+x)*2,TS-4,2);
        ctx.fillRect(px+2,py+TS/2+Math.sin(wt+x+1)*2,TS-4,2);
        ctx.fillRect(px+2,py+TS-4+Math.sin(wt+x+2)*2,TS-4,2);
      }
      if(forests[y]&&forests[y][x]>0){
        ctx.fillStyle=C.grass;
        ctx.fillRect(px,py,TS,TS);
        ctx.fillStyle=C.forest;
        for(let t=0;t<5;t++){
          const tx2=px+4+t*4+Math.sin(t*7)*2;
          const ty2=py+TS-4-Math.abs(Math.sin(t*3+x))*8;
          ctx.fillRect(tx2,ty2,2,8);
          ctx.fillStyle=`hsl(120,60%,${25+t*3}%)`;
          ctx.beginPath();
          ctx.moveTo(tx2+1,ty2);
          ctx.lineTo(tx2-2,ty2-4);
          ctx.lineTo(tx2+4,ty2-4);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle=C.forest;
        }
      }
    }
  }
  if(base&&base.alive){
    const bx=base.x,by=base.y-HUD_H;
    ctx.fillStyle=C.base;
    ctx.fillRect(bx,by,TS*2,TS*2);
    ctx.fillStyle=C.baseDark;
    ctx.fillRect(bx+2,by+2,TS*2-4,TS*2-4);
    ctx.fillStyle=C.base;
    const flag=Date.now()/300;
    ctx.fillRect(bx+TS-1,by,2,TS*2);
    ctx.fillStyle='#c00';
    ctx.beginPath();
    ctx.moveTo(bx+TS+1,by+2);
    ctx.lineTo(bx+TS-4+Math.sin(flag)*2,by+8);
    ctx.lineTo(bx+TS+1,by+14);
    ctx.closePath();
    ctx.fill();
  }else if(base){
    ctx.fillStyle='#400';
    ctx.fillRect(base.x,base.y-HUD_H,TS*2,TS*2);
    ctx.fillStyle='#600';
    ctx.font='bold 16px Arial';
    ctx.textAlign='center';
    ctx.fillText('X',base.x+TS,base.y-HUD_H+TS);
  }
}

/* =============================================================
   MODULE: Game Logic (Spawn, Wave, Collision)
   ============================================================= */
function spawnEnemy(){
  const types=[0,1,2,3];
  const type=types[Math.floor(Math.random()*types.length)];
  const speeds=[1.0+wave*0.1,1.6+wave*0.08,0.8+wave*0.05,1.2+wave*0.1];
  const colors=['#c00','#c60','#c30','#933'];
  const possibleSpawns=[];
  for(let x=2;x<G-2;x++){
    possibleSpawns.push(x);
  }
  const sx=possibleSpawns[Math.floor(Math.random()*possibleSpawns.length)]*TS;
  const enemy=new Tank(sx,-TS,2,false);
  enemy.type=type;
  enemy.speed=Math.min(speeds[type],3.0);
  enemy.tankColor=colors[type];
  enemy.aiDir=2;
  enemies.push(enemy);
}

function spawnPowerup(x,y){
  // Balance: reduce powerup spawn rate
  if(Math.random()>0.3)return;
  const types=['life','rapid','big','shield','star','grenade','mine'];
  // Weighted selection
  const weights=[0.1,0.18,0.18,0.1,0.16,0.14,0.14];
  let r=Math.random(),cum=0;
  let type='star';
  for(let i=0;i<types.length;i++){
    cum+=weights[i];
    if(r<cum){type=types[i];break;}
  }
  powerups.push(new PowerUp(x,y,type));
}

function createExplosion(x,y,big=false){
  explosions.push(new Explosion(x,y,big));
  const particleCount=big?25:10;
  for(let i=0;i<particleCount;i++){
    const col=C.exp[Math.floor(Math.random()*5)];
    particles.push(new Particle(x,y,col,big?8:5));
  }
  if(big)screenShake=12;
  else screenShake=Math.max(screenShake,3);
}

function checkBulletCollision(b){
  const gx=Math.floor(b.x/TS),gy=Math.floor((b.y-HUD_H)/TS);
  if(gx<0||gx>=G||gy<0||gy>=GH)return false;
  if(bricks[gy]&&bricks[gy][gx]>0){
    bricks[gy][gx]=0;
    playHit();
    createExplosion(b.x,b.y);
    // 砖墙碎屑粒子 - brown debris
    spawnBrickDebris(gx*TS+TS/2,gy*TS+HUD_H+TS/2);
    return true;
  }
  if(steels[gy]&&steels[gy][gx]>0){
    if(b.big){
      steels[gy][gx]=0;
      playHit();
      createExplosion(b.x,b.y);
      return true;
    }
    playHit();
    // 钢墙黄色火花
    spawnSteelSparks(b.x,b.y);
    return true;
  }
  // 水面涟漪效果
  if(waters[gy]&&waters[gy][gx]>0){
    spawnWaterRipple(b.x,b.y);
    playSplash();
    return true;
  }
  return false;
}

function spawnBrickDebris(x,y){
  // 砖墙碎屑 - brown/tan particles
  const colors=['#b87333','#8b4513','#cd853f','#a0522d'];
  for(let i=0;i<8;i++){
    const p=new Particle(x,y,colors[Math.floor(Math.random()*colors.length)],6);
    p.vx=(Math.random()-0.5)*10;
    p.vy=(Math.random()-0.5)*10-2;
    p.size=2+Math.random()*3;
    p.life=20+Math.random()*15;
    p.maxLife=p.life;
    particles.push(p);
  }
}

function spawnSteelSparks(x,y){
  // 钢墙黄色火花 - yellow/orange sparks
  const sparkColors=['#ff0','#ffa500','#ff8c00','#ffff00'];
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*5;
    const p=new Particle(x,y,sparkColors[Math.floor(Math.random()*sparkColors.length)],speed);
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
    p.size=1+Math.random()*2;
    p.life=10+Math.random()*10;
    p.maxLife=p.life;
    p.draw=function(){
      ctx.save();
      ctx.globalAlpha=Math.max(0,this.life/this.maxLife);
      ctx.fillStyle=this.col;
      ctx.shadowColor=this.col;
      ctx.shadowBlur=4;
      ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
      ctx.restore();
    };
    particles.push(p);
  }
}

// 水波纹对象池
const ripplePool=[];
const MAX_RIPPLES=30;
function spawnWaterRipple(x,y){
  // 查找可用波纹或创建新的
  let ripple=ripplePool.find(r=>!r.alive);
  if(!ripple&&ripplePool.length<MAX_RIPPLES){
    ripple={alive:true,x:0,y:0,radius:0,maxRadius:20,alpha:1};
    ripplePool.push(ripple);
  }
  if(ripple){
    ripple.alive=true;
    ripple.x=x;
    ripple.y=y;
    ripple.radius=2;
    ripple.maxRadius=15+Math.random()*10;
    ripple.alpha=0.8;
    ripple.life=0;
  }
}

function checkTankHit(b,tank){
  return b.x>tank.x&&b.x<tank.x+TS&&b.y>tank.y&&b.y<tank.y+TS;
}

function checkBaseHit(b){
  if(!base||!base.alive)return false;
  return b.x>base.x&&b.x<base.x+TS*2&&b.y>base.y&&b.y<base.y+TS*2;
}

function applyPowerup(pu,tank){
  playPowerup();
  const puFlashColors={life:'rgba(255,0,0,0.3)',rapid:'rgba(255,255,0,0.3)',big:'rgba(255,128,0,0.3)',shield:'rgba(0,0,255,0.3)',star:'rgba(0,255,255,0.3)',grenade:'rgba(0,255,0,0.3)',mine:'rgba(255,0,255,0.3)'};
  if(puFlashColors[pu]){
    flashTimer=10;
    flashColor=puFlashColors[pu];
  }
  if(pu==='life'){
    if(lives<5)lives++;
    updateLivesDisplay();
  }else if(pu==='rapid'){
    rapidTimer=Math.min(rapidTimer+600,1800); // 时间叠加，最大30秒
    if(tank)tank.rapid=true;
  }else if(pu==='big'){
    bigBulletTimer=Math.min(bigBulletTimer+600,1800);
    if(tank)tank.bigBullet=true;
  }else if(pu==='shield'){
    shieldTimer=Math.min(shieldTimer+300,900); // 时间叠加，最大15秒
    if(tank){tank.shield=true;tank.shieldTimer=shieldTimer;}
    playShield();
  }else if(pu==='star'){
    if(tank){
      tank.level=Math.min(3,tank.level+1);
      showLevelUp(tank.level);
      if(tank.level===3)playLevelUp();
      updateTankLevel();
    }
  }else if(pu==='grenade'){
    grenadeCount++;
  }else if(pu==='mine'){
    mineCount++;
  }
}

function showLevelUp(lv){
  const el=document.getElementById('level-up');
  el.textContent=`★ 坦克升级 Lv.${lv} ★`;
  el.style.display='block';
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='fadeUp 1s ease-out forwards';
  setTimeout(()=>el.style.display='none',1000);
}

const enemyTypeNames={0:'速',1:'中',2:'重',3:'标'};

// 道具状态显示
const puIcons={life:'♥',rapid:'⚡',big:'●',shield:'◈',star:'★',grenade:'💣',mine:'⚓'};
const puColors={life:'#f00',rapid:'#ff0',big:'#f80',shield:'#00f',star:'#0ff',grenade:'#0f0',mine:'#f0f'};
function updatePowerupStatus(){
  const container=document.getElementById('powerup-status');
  if(!container)return;
  container.innerHTML='';

  // 闪烁警告（低于3秒=180帧时闪烁）
  puBlinkTimer=(puBlinkTimer+1)%30;
  const isBlinking=(timer)=>timer>0&&timer<=180&&puBlinkTimer<15;

  const addPu=(timer,name,maxTimer)=>{
    if(timer<=0)return;
    const percent=(timer/maxTimer)*100;
    const div=document.createElement('div');
    div.className='pu-icon';
    const blink=isBlinking(timer);
    div.style.cssText=`background:${puColors[name]};box-shadow:0 0 6px ${puColors[name]};opacity:${blink?0.5+puBlinkTimer/30:1}`;
    div.innerHTML=`${puIcons[name] || '?'}<div class="pu-bar"><div class="pu-bar-fill" style="width:${percent}%;background:${puColors[name]}"></div></div>`;
    container.appendChild(div);
  };

  addPu(rapidTimer,'rapid',1200);
  addPu(bigBulletTimer,'big',1200);
  addPu(shieldTimer,'shield',600);
  // 手雷数量显示
  if(grenadeCount>0){
    const div=document.createElement('div');
    div.className='pu-icon';
    div.textContent=`💣×${grenadeCount}`;
    div.style.cssText=`background:transparent;border:2px solid #0f0;box-shadow:0 0 6px #0f0;color:#0f0;font-weight:bold`;
    container.appendChild(div);
  }
  // 地雷数量显示
  if(mineCount>0){
    const div=document.createElement('div');
    div.className='pu-icon';
    div.textContent=`⚓×${mineCount}`;
    div.style.cssText=`background:transparent;border:2px solid #f0f;box-shadow:0 0 6px #f0f;color:#f0f;font-weight:bold`;
    container.appendChild(div);
  }
}

// 手雷使用
function useGrenade(){
  if(grenadeCount<=0||gameState!=='playing')return;
  grenadeCount--;
  playExplode(true);
  // 消灭所有敌人
  for(const e of enemies){
    if(e.alive){
      tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
      e.alive=false;
      createExplosion(e.cx,e.cy,true);
      score+=100*(e.type+1)*comboMultiplier;
      killCount++;
      enemiesLeft=Math.max(0,enemiesLeft-1);
    }
  }
  enemies=enemies.filter(e=>e.alive);
  // 屏幕震动
  screenShake=20;
  slowMotionTimer=12; // 0.2秒慢动作
  flashTimer=15;
  flashColor='rgba(255,200,0,0.4)';
  updateHUD();
}

// 地雷放置
function placeMine(){
  if(mineCount<=0||gameState!=='playing'||!player||!player.alive)return;
  mineCount--;
  // Place mine at player's current position
  mines.push(new Mine(player.x,player.y));
  updateHUD();
}

function handlePlayerInput(){
  if(!player||!player.alive)return;

  let moved=false;
  if(keys['ArrowUp']){player.move(0);moved=true;}
  else if(keys['ArrowRight']){player.move(1);moved=true;}
  else if(keys['ArrowDown']){player.move(2);moved=true;}
  else if(keys['ArrowLeft']){player.move(3);moved=true;}

  if(keys['Space']||keys['KeyX']){
    const b=player.shoot();
    if(b){bullets.push(b);shotsFired++;}
  }
}

function handlePlayer2Input(){
  if(!player2||!player2.alive)return;

  let moved=false;
  if(keys['KeyW']){player2.move(0);moved=true;}
  else if(keys['KeyD']){player2.move(1);moved=true;}
  else if(keys['KeyS']){player2.move(2);moved=true;}
  else if(keys['KeyA']){player2.move(3);moved=true;}

  if(keys['KeyE']||keys['Numpad0']){

    if(b){bullets.push(b);shotsFired++;}
  }
}

function respawnPlayer(){
  const baseTX=Math.floor(G/2)-1;
  player=new Tank(baseTX*TS,(GH-3)*TS+HUD_H,0,true);
  player.shieldTimer=300; // 5秒无敌时间 (300 frames @ 60fps)
  player.invincible=300;
  if(rapidTimer>0)player.rapid=true;
  if(bigBulletTimer>0)player.bigBullet=true;
  if(shieldTimer>0){player.shield=true;player.shieldTimer=shieldTimer;}
  player.level=Math.max(1,player.level);
  updateTankLevel();
  // 出生粒子效果
  spawnRespawnParticles(player.cx, player.cy);
}

function respawnPlayer2(){
  const baseTX=Math.floor(G/2)-1;
  player2=new Tank(baseTX*TS+TS*2,(GH-3)*TS+HUD_H,0,true);
  player2.shieldTimer=300;
  player2.invincible=300;
  player2.level=Math.max(1,player2.level);
  // 出生粒子效果
  spawnRespawnParticles(player2.cx, player2.cy);
}

function spawnRespawnParticles(x,y){
  // 蓝色保护光环粒子
  for(let i=0;i<20;i++){
    const angle=(Math.PI*2/20)*i;
    const speed=2+Math.random()*2;
    const p=new Particle(x,y,'#0cf',speed*0.8);
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
    p.life=50;
    p.maxLife=50;
    p.size=4;
    p.draw=function(){
      ctx.save();
      ctx.globalAlpha=Math.max(0,this.life/this.maxLife)*0.8;
      ctx.fillStyle='#0cf';
      ctx.shadowColor='#0cf';
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size*(this.life/this.maxLife+0.3),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    };
    particles.push(p);
  }
}

function respawnPlayer2(){

function startGame(twoPlayer=false){

  stopBgParticles();
  score=0;lives=3;wave=selectedLevel;
  enemies=[];bullets=[];explosions=[];powerups=[];particles=[];tankDebris=[];
  spawnQueue=[];
  shieldTimer=0;rapidTimer=0;bigBulletTimer=0;
  isTwoPlayer=twoPlayer;
  killCount=0;shotsFired=0;shotsHit=0;survivalTime=0;restartPromptTimer=0;grenadeCount=0;comboCount=0;comboTimer=0;comboMultiplier=1;

  generateMap(wave);

function gameOver(win=false){

  if(score>hiScore){
    hiScore=score;
    saveGameData(); // Save new high score
  }
  if(win)unlockNextLevel(); // Unlock next level on victory
  const msg=document.getElementById('msg');
  const survivalSec=Math.floor(gameTime/60);
  const accuracy=shotsFired>0?Math.round(shotsHit/shotsFired*100):0;
  if(win){
    msg.innerHTML=`<h1>恭喜过关!</h1><h2>WAVE ${wave} CLEAR!</h2>
      <p>得分: ${formatScore(score)}</p>

      <p>波次: 第 ${wave} 波</p>

function drawMinimap(){
  mmCtx.fillStyle='#001200';
  mmCtx.fillRect(0,0,80,60);
  for(let y=0;y<GH;y++){
    for(let x=0;x<G;x++){
      if(bricks[y]&&bricks[y][x]>0){
        mmCtx.fillStyle='#630';
        mmCtx.fillRect(x/G*80,y/GH*60,80/G+0.5,60/GH+0.5);
      }
      if(steels[y]&&steels[y][x]>0){
        mmCtx.fillStyle='#456';
        mmCtx.fillRect(x/G*80,y/GH*60,80/G+0.5,60/GH+0.5);
      }
      if(waters[y]&&waters[y][x]>0){
        mmCtx.fillStyle='#148';
        mmCtx.fillRect(x/G*80,y/GH*60,80/G+0.5,60/GH+0.5);
      }
    }
  }
  if(base&&base.alive){
    mmCtx.fillStyle='#00f';
    mmCtx.fillRect(base.x/GW*80,base.y/(H-HUD_H)*60,5,5);
  }
  // Draw bullets on minimap as yellow dots
  bullets.forEach(b=>{
    if(b.alive){
      mmCtx.fillStyle=b.big?'#f80':'#ff0';
      mmCtx.fillRect(b.x/GW*80,b.y/(H-HUD_H)*60,2,2);
    }
  });
  enemies.forEach(e=>e.drawMinimap());
  if(player&&player.alive)player.drawMinimap();
  if(player2&&player2.alive)player2.drawMinimap();
}

function drawRipples(){
  // 更新和绘制水面涟漪
  for(const ripple of ripplePool){
    if(!ripple.alive)continue;
    ripple.life++;
    ripple.radius+=(ripple.maxRadius-ripple.radius)*0.15;
    ripple.alpha-=0.03;
    if(ripple.alpha<=0){
      ripple.alive=false;
      continue;
    }
    ctx.save();
    ctx.globalAlpha=ripple.alpha;
    ctx.strokeStyle='#4cf';
    ctx.lineWidth=1.5;
    ctx.shadowColor='#4cf';
    ctx.shadowBlur=4;
    ctx.beginPath();
    ctx.arc(ripple.x,ripple.y,ripple.radius,0,Math.PI*2);
    ctx.stroke();
    // 第二层涟漪
    if(ripple.radius>5){
      ctx.globalAlpha=ripple.alpha*0.5;
      ctx.beginPath();
      ctx.arc(ripple.x,ripple.y,ripple.radius*0.6,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

/* =============================================================
   MODULE: Rendering (draw functions)
   ============================================================= */
function draw(){
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(0,0,GW,H);
  drawMap();
  drawRipples();
  // 可见性检查 - 只绘制屏幕内的对象
  const margin=TS*2;
  powerups.forEach(p=>{if(p.x>-margin&&p.x<GW+margin)p.draw();});
  explosions.forEach(e=>{if(e.x>-margin&&e.x<GW+margin)e.draw();});
  tankDebris.forEach(d=>{if(d.x>-margin&&d.x<GW+margin)d.draw();});
  particles.forEach(p=>{if(p.x>-margin&&p.x<GW+margin&&p.y>-margin&&p.y<H+margin)p.draw();});
  enemies.forEach(e=>{if(e.x>-margin&&e.x<GW+margin)e.draw();});
  if(player&&player.alive)player.draw();
  if(player2&&player2.alive)player2.draw();
  bullets.forEach(b=>{if(b.x>-margin&&b.x<GW+margin&&b.y>-margin&&b.y<H+margin)b.draw();});
  mines.forEach(m=>m.draw());
  damageNumbers.forEach(d=>d.draw());
  tireTrails.forEach(t=>t.draw());

  // Wave transition countdown display
  if(waveTransitionTimer>0){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(GW/2-120,H/2-60,240,80);
    ctx.strokeStyle='#ff0';
    ctx.lineWidth=2;
    ctx.strokeRect(GW/2-120,H/2-60,240,80);
    ctx.fillStyle='#ff0';
    ctx.font='bold 20px Courier New';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowColor='#ff0';
    ctx.shadowBlur=15;
    ctx.fillText(`WAVE ${wave}`,GW/2,H/2-20);
    ctx.font='bold 36px Courier New';
    const countNum=waveTransitionCountdown>0?waveTransitionCountdown:1;
    ctx.fillText(countNum,GW/2,H/2+15);
    ctx.restore();
  }

  // Bullet prediction line when holding space
  if(spaceHeld&&player&&player.alive&&gameState==='playing'){
    drawBulletPrediction(player);
  }
}

// Draw bullet trajectory prediction
function drawBulletPrediction(tank){
  const bulletSpeed=tank.bigBullet||tank.level>=3?8:6;
  let px=tank.cx,py=tank.cy;
  const dir=tank.dir;
  // Starting position offset
  if(dir===0)py=tank.y-6;
  else if(dir===1)px=tank.x+TS;
  else if(dir===2)py=tank.y+TS;
  else px=tank.x-6;

  const vx=dir===1?bulletSpeed:dir===3?-bulletSpeed:0;
  const vy=dir===0?-bulletSpeed:dir===2?bulletSpeed:0;

  ctx.save();
  ctx.strokeStyle='rgba(255,255,0,0.5)';
  ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.shadowColor='#ff0';
  ctx.shadowBlur=5;

  let lastX=px,lastY=py;
  for(let i=0;i<50;i++){
    const nx=px+vx*(i+1);
    const ny=py+vy*(i+1);
    // Check collision with walls
    const gx=Math.floor(nx/TS);
    const gy=Math.floor((ny-HUD_H)/TS);
    if(gx<0||gx>=G||gy<0||gy>=GH||(bricks[gy]&&bricks[gy][gx]>0)||(steels[gy]&&steels[gy][gx]>0)){
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(nx,ny);
      ctx.stroke();
      // Draw impact marker
      ctx.beginPath();
      ctx.arc(nx,ny,4,0,Math.PI*2);
      ctx.stroke();
      break;
    }
    lastX=nx;lastY=ny;
    if(i%5===0){
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(nx,ny);
      ctx.stroke();
    }
  }
  ctx.restore();
}

/* =============================================================
   MODULE: Game Loop & Rendering
   ============================================================= */
function update(){
  if(gameState!=='playing')return;
  gameTime++;
  if(flashTimer>0)flashTimer--;
  if(screenShake>0)screenShake*=0.85;
  // 连击计时
  if(comboTimer>0){
    comboTimer--;
    if(comboTimer<=0){
      comboCount=0;
      comboMultiplier=1;
    }
  }

  // Sync shield timer to player
  if(player){
    player.shieldTimer=shieldTimer;
    if(player.invincible>0)player.invincible--;
  }
  if(player2&&player2.invincible>0)player2.invincible--;

  if(shieldTimer>0){
    shieldTimer--;
    if(player)player.shield=shieldTimer>0;
    if(player2)player2.shield=shieldTimer>0;
  }
  if(rapidTimer>0){
    rapidTimer--;
    if(player)player.rapid=rapidTimer>0;
    if(player2)player2.rapid=rapidTimer>0;
  }
  if(bigBulletTimer>0){
    bigBulletTimer--;
    if(player)player.bigBullet=bigBulletTimer>0;
    if(player2)player2.bigBullet=bigBulletTimer>0;
  }

  // Spawn enemies - only after wave transition countdown
  if(waveTransitionTimer>0){
    waveTransitionTimer--;
    waveTransitionCountdown=Math.ceil(waveTransitionTimer/60);
  } else {
    spawnTimer++;
    if(spawnQueue.length>0&&spawnTimer>=spawnQueue[0].delay){
      spawnQueue.shift();
      if(enemiesLeft>0){
        spawnEnemy();
        enemiesLeft--;
        updateHUD();
      }
    }
  }

  const waveSpawnDone=spawnQueue.length===0&&enemiesLeft===0&&enemies.length===0;
  if(waveSpawnDone&&gameState==='playing'){
    nextWave();
  }

  // Player input
  handlePlayerInput();
  if(isTwoPlayer)handlePlayer2Input();

  // Update tank physics (acceleration, inertia, sliding)
  if(player)player.updatePhysics();
  if(player2&&player2.alive)player2.updatePhysics();

  // Enemy AI
  enemies.forEach(e=>e.ai());

  // Update bullets
  bullets.forEach(b=>b.update());
  bullets=bullets.filter(b=>b.alive);

  // Bullet collisions
  for(const b of bullets){
    if(checkBulletCollision(b)){b.alive=false;continue;}
    if(checkBaseHit(b)){b.alive=false;base.alive=false;playExplode(true);createExplosion(base.x+TS,base.y+TS,true);gameOver(false);return;}

    // Player bullets hit enemies
    if(b.isPlayer||b.isPlayer2){
      for(const e of enemies){
        if(e.alive&&checkTankHit(b,e)){
          b.alive=false;
          shotsHit++;
          killCount++;
          // 坦克裂解动画
          tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
          e.alive=false;
          // 连击系统
          comboCount++;
          comboTimer=180; // 3秒 @ 60fps
          if(comboCount>=10)comboMultiplier=3;
          else if(comboCount>=5)comboMultiplier=2;
          else if(comboCount>=3)comboMultiplier=1.5;
          const damage=Math.floor(100*(e.type+1)*comboMultiplier);
          score+=damage;
          // 伤害数字飘字
          damageNumbers.push(new DamageNumber(e.cx,e.cy-10,damage,comboCount>=3));
          playExplode();
          createExplosion(e.cx,e.cy,true); // 大爆炸
          hitStopTimer=3; // 0.05秒hit-stop
          killFlashTimer=15; // 击杀边缘闪光
          spawnPowerup(e.x,e.y);
          enemiesLeft=Math.max(0,enemiesLeft-1);
          updateHUD();
          break;
        }
      }
    }else{
      // Enemy bullets - check both players
      const checkHit=(p)=>{
        if(p&&p.alive&&p.invincible<=0&&!p.shield&&checkTankHit(b,p)){
          b.alive=false;
          p.alive=false;
          playDie();
          createExplosion(p.cx,p.cy,true);
          return true;
        }
        return false;
      };
      if(checkHit(player)) {
        lives--;
        updateLivesDisplay();
        if(lives<=0){
          gameOver(false);
          return;
        }
        setTimeout(respawnPlayer,1500);
      } else if(isTwoPlayer&&checkHit(player2)){
        lives--;
        updateLivesDisplay();
        if(lives<=0){
          gameOver(false);
          return;
        }
        setTimeout(respawnPlayer2,1500);
      }
    }
  }

  // Enemy collision with players
  for(const e of enemies){
    if(!e.alive)continue;
    const checkCollision=(p,isP2)=>{
      if(p&&p.alive&&p.invincible<=0&&!p.shield&&Math.abs(e.cx-p.cx)<TS*0.8&&Math.abs(e.cy-p.cy)<TS*0.8){
        p.alive=false;
        playDie();
        createExplosion(p.cx,p.cy,true);
        return true;
      }
      return false;
    };
    if(checkCollision(player)){
      lives--;
      updateLivesDisplay();
      if(lives<=0){gameOver(false);return;}
      setTimeout(respawnPlayer,1500);
    }else if(isTwoPlayer&&checkCollision(player2)){
      lives--;
      updateLivesDisplay();
      if(lives<=0){gameOver(false);return;}
      setTimeout(respawnPlayer2,1500);
    }
  }

  enemies=enemies.filter(e=>e.alive);

  // Powerup collection
  powerups.forEach(p=>p.update());
  powerups=powerups.filter(p=>p.alive);

  const collectPowerup=(p,tank)=>{
    if(p.alive&&tank&&tank.alive&&Math.abs(tank.cx-(p.x+TS/2))<TS&&Math.abs(tank.cy-(p.y+TS/2))<TS){
      p.alive=false;
      applyPowerup(p.type,tank);
    }
  };

  if(player)powerups.forEach(p=>collectPowerup(p,player));
  if(player2)powerups.forEach(p=>collectPowerup(p,player2));

  // Mine collision with enemies
  for(let i=mines.length-1;i>=0;i--){
    const m=mines[i];
    m.update();
    if(!m.alive){mines.splice(i,1);continue;}
    // Check enemy collision
    for(const e of enemies){
      if(m.checkHit(e)){
        m.alive=false;
        createExplosion(m.x+TS/2,m.y+TS/2,true);
        playExplode(true);
        screenShake=15;
        e.alive=false;
        tankDebris.push(new TankDebris(e.x+TS/2,e.y+TS/2,e.dir,e.tankColor));
        score+=100*(e.type+1)*comboMultiplier;
        damageNumbers.push(new DamageNumber(e.cx,e.cy-10,Math.floor(100*(e.type+1)*comboMultiplier),false));
        killCount++;
        enemiesLeft=Math.max(0,enemiesLeft-1);
        spawnPowerup(e.x,e.y);
        break;
      }
    }
  }
  mines=mines.filter(m=>m.alive);

  // Update explosions and particles
  explosions.forEach(e=>e.update());
  explosions=explosions.filter(e=>e.alive);
  tankDebris.forEach(d=>d.update());
  tankDebris=tankDebris.filter(d=>d.alive);
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>p.alive);
  damageNumbers.forEach(d=>d.update());
  damageNumbers=damageNumbers.filter(d=>d.alive);
  tireTrails.forEach(t=>t.update());
  tireTrails=tireTrails.filter(t=>t.alive);
}

/* =============================================================
   MODULE: Main Game Loop
   ============================================================= */
let lastTime=0;
let fps=0,fpsFrames=0,fpsTimer=0,showFps=false;
let highContrast=false;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt=ts-lastTime;
  // FPS计算
  fpsFrames++;
  fpsTimer+=dt;
  if(fpsTimer>=1000){
    fps=fpsFrames;
    fpsFrames=0;
    fpsTimer=0;
  }
  // Hit-stop暂停
  if(hitStopTimer>0){hitStopTimer--;return;}
  // 超过60FPS时跳帧
  if(dt<16.67)return;
  lastTime=ts;
  // 慢动作处理
  const useUpdate= slowMotionTimer>0?(fpsFrames%(slowMotionTimer>6?4:2)!==0):true;
  if(slowMotionTimer>0){
    slowMotionTimer--;
    if(useUpdate)update();
  }else if(gameState==='playing'){
    update();
  }
  updateBgParticles();
  updateMuteIndicator();
  updateWeather();
  ctx.save();
  if(screenShake>0.5){
    ctx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*2);
  }
  draw();
  if(showFps){
    ctx.fillStyle='#0f0';
    ctx.font='12px Courier New';
    ctx.fillText(`FPS:${fps}`,5,20);
  }
  if(gameState==='start'||gameState==='gameover'){
    drawBgParticles();
  }
  animateScoreGain(); // 得分放大动画
  ctx.restore();
  if(flashTimer>0){
    ctx.save();
    ctx.fillStyle=flashColor;
    ctx.globalAlpha=flashTimer/30;
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
  // Kill edge flash
  if(killFlashTimer>0){
    killFlashTimer--;
    const alpha=killFlashTimer/15*0.6;
    ctx.save();
    ctx.globalAlpha=alpha;
    const grad=ctx.createRadialGradient(GW/2,H/2,0,GW/2,H/2,GW*0.7);
    grad.addColorStop(0,'transparent');
    grad.addColorStop(0.7,'transparent');
    grad.addColorStop(1,'rgba(255,100,50,0.8)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,GW,H);
    ctx.restore();
  }
  drawMinimap();
  drawWeather();
}

// 开始画面背景粒子
let bgParticles=[];
let bgParticleActive=false;
function startBgParticles(){
  bgParticles=[];
  bgParticleActive=true;
  for(let i=0;i<30;i++){
    bgParticles.push({
      x:Math.random()*GW,
      y:Math.random()*(H-HUD_H),
      vx:(Math.random()-0.5)*0.5,
      vy:(Math.random()-0.5)*0.5,
      size:1+Math.random()*2,
      alpha:0.2+Math.random()*0.3,
      color:Math.random()>0.5?'#0f0':'#ff0'
    });
  }
}
function updateBgParticles(){
  if(!bgParticleActive)return;
  for(const p of bgParticles){
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0)p.x=GW;
    if(p.x>GW)p.x=0;
    if(p.y<0)p.y=H-HUD_H;
    if(p.y>H-HUD_H)p.y=0;
  }
}
function drawBgParticles(){
  if(!bgParticleActive)return;
  for(const p of bgParticles){
    ctx.save();
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
function stopBgParticles(){
  bgParticleActive=false;
}

}

/* =============================================================
   MODULE: Event Listeners & Initialization
   ============================================================= */
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space')spaceHeld=true;
  if(e.code==='Enter'){
    if(gameState==='start'||gameState==='gameover'||gameState==='victory'){
      // Level selection with arrow keys
      if(e.code==='ArrowRight'||e.code==='ArrowUp'){
        selectedLevel=selectedLevel%5+1;
        if(selectedLevel>unlockedLevels)selectedLevel=1;
        showStartScreen();
      }else if(e.code==='ArrowLeft'||e.code==='ArrowDown'){
        selectedLevel--;
        if(selectedLevel<1)selectedLevel=unlockedLevels;
        showStartScreen();
      }else if(e.shiftKey){
        startGame(true);
      }else{
        startGame(false);
      }
    }else if(gameState==='playing'){
      gameState='paused';
      stopBgMusic();
      const msg=document.getElementById('msg');
      msg.innerHTML=`<h1 style="font-size:28px">暂停</h1><h2>PAUSED</h2><p class="blink">[ PRESS ENTER 继续 ]</p>`;
      msg.style.display='block';
    }else if(gameState==='paused'){
      gameState='playing';
      document.getElementById('msg').style.display='none';
      startBgMusic();
    }
  }
  if(e.code==='KeyM'){
    muted=!muted;
    localStorage.setItem('tankMuted',muted);
    if(muted)stopBgMusic();else if(gameState==='playing')startBgMusic();
    showMuteIndicator();
  }
  if(e.code==='KeyG'){
    useGrenade();
  }
  if(e.code==='KeyB'){
    placeMine();
  }
  if(e.code==='KeyF'){
    showFps=!showFps;
  }
  if(e.code==='KeyH'){
    highContrast=!highContrast;
    document.body.classList.toggle('high-contrast',highContrast);
  }
  if(e.code==='KeyP'){
    // 暂停
    if(gameState==='playing'){
      gameState='paused';
      stopBgMusic();
      const msg=document.getElementById('msg');
      msg.innerHTML=`<h1 style="font-size:28px">暂停</h1><h2>PAUSED</h2><p class="blink">[ PRESS ENTER 继续 ]</p>`;
      msg.style.display='block';
    }
  }
  if(e.code==='KeyR'){
    // 重新开始本波
    if(gameState==='playing'){
      enemies=[];bullets=[];
      for(let i=0;i<Math.min(4,totalEnemies);i++){
        spawnQueue.push({delay:i*spawnInterval});
      }
      spawnTimer=0;
    }
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)){
    e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='Space')spaceHeld=false;
});

updateTankLevel();
showStartScreen();
generateMap(1);
requestAnimationFrame(gameLoop);
</script>
